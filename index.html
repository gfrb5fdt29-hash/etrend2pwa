síros, nem nehéz.\n**Maradékfelhasználási vagy előkészítési tipp:** A 2. adagot tedd el másnapra vagy fagyaszd; köretet cserélve változatos marad.\n**Eltarthatóság:**\n- Fagyasztható-e: Igen.\n- Hűtőben tartható-e 1–2 napig: Igen, 2 napig.\n- Frissen érdemes-e elkészíteni: Maradékként is jó.\n- Másnapi felhasználási ötlet: Teljes kiőrlésű tortillába vagy salátalevélbe tekerve, könnyű ebédként.\n\n### Hideg vacsorák és krémek\n\n---"}, {"id": "R23", "name": "Körözött light", "category": "Hideg vacsora / krém", "tags": ["túrós", "hideg vacsora", "vércukorbarát", "emésztésbarát", "kenyérrel fogyasztható", "savanyúsággal ajánlott"], "servings": "1–2 adag", "time": "kb. 10 perc", "ingredientsText": "150 g light vagy félzsíros túró; 2–3 ek kefir vagy natúr joghurt (a vaj/tejföl helyett); 1 tk pirospaprika; fél kis fej vöröshagyma apróra; csipet köménymag; kevés mustár; só; tálaláshoz retek és 1 kisebb szelet kenyér.", "ingredients": ["150 g light vagy félzsíros túró", "2–3 ek kefir vagy natúr joghurt (a vaj/tejföl helyett)", "1 tk pirospaprika", "fél kis fej vöröshagyma apróra", "csipet köménymag", "kevés mustár", "só", "tálaláshoz retek és 1 kisebb szelet kenyér."], "steps": ["A túrót törd össze villával egy tálban.", "Keverd hozzá a kefirt, amíg krémes lesz (ez a sok vaj helyett ad lágyságot).", "Add hozzá a pirospaprikát, az apróra vágott hagymát, a köményt, a mustárt, sózd.", "Hagyd állni 10 percet, hogy összeérjenek az ízek, és tálald retekkel, 1 kis szelet kenyérrel."], "bloodSugarTip": "A klasszikus körözött vajjal készül – ez kefirrel, így könnyebb, fehérjében gazdag, és kevesebb a zsír.", "digestionTip": "A túró és kefir probiotikumokat és fehérjét ad; a friss retek és hagyma rostot.", "prepOrLeftoverTip": "Dupla adag is készülhet; másnap reggelire kenyérre kenve is tökéletes.", "storage": {"freezable": "Nem.", "fridge": "Igen, lefedve.", "freshRecommended": "1–2 napon belül a legjobb.", "nextDayIdea": "Mártogatósként friss zöldségekhez délutáni vészmegoldásként.", "raw": "- Fagyasztható-e: Nem.\n- Hűtőben tartható-e 1–2 napig: Igen, lefedve.\n- Frissen érdemes-e elkészíteni: 1–2 napon belül a legjobb.\n- Másnapi felhasználási ötlet: Mártogatósként friss zöldségekhez délutáni vészmegoldásként.\n\n---"}, "rawText": "**Recept ID:** R23\n**Recept neve:** Körözött light\n**Kategória:** Hideg vacsora / krém\n**Címkék:** túrós, hideg vacsora, vércukorbarát, emésztésbarát, kenyérrel fogyasztható, savanyúsággal ajánlott\n**Hány adagra készül:** 1–2 adag\n**Elkészítési idő:** kb. 10 perc\n**Hozzávalók:** 150 g light vagy félzsíros túró; 2–3 ek kefir vagy natúr joghurt (a vaj/tejföl helyett); 1 tk pirospaprika; fél kis fej vöröshagyma apróra; csipet köménymag; kevés mustár; só; tálaláshoz retek és 1 kisebb szelet kenyér.\n**Elkészítés lépésről lépésre:**\n1. A túrót törd össze villával egy tálban.\n2. Keverd hozzá a kefirt, amíg krémes lesz (ez a sok vaj helyett ad lágyságot).\n3. Add hozzá a pirospaprikát, az apróra vágott hagymát, a köményt, a mustárt, sózd.\n4. Hagyd állni 10 percet, hogy összeérjenek az ízek, és tálald retekkel, 1 kis szelet kenyérrel.\n**Vércukorbarát tipp:** A klasszikus körözött vajjal készül – ez kefirrel, így könnyebb, fehérjében gazdag, és kevesebb a zsír.\n**Emésztésbarát tipp:** A túró és kefir probiotikumokat és fehérjét ad; a friss retek és hagyma rostot.\n**Maradékfelhasználási vagy előkészítési tipp:** Dupla adag is készülhet; másnap reggelire kenyérre kenve is tökéletes.\n**Eltarthatóság:**\n- Fagyasztható-e: Nem.\n- Hűtőben tartható-e 1–2 napig: Igen, lefedve.\n- Frissen érdemes-e elkészíteni: 1–2 napon belül a legjobb.\n- Másnapi felhasználási ötlet: Mártogatósként friss zöldségekhez délutáni vészmegoldásként.\n\n---"}, {"id": "R24", "name": "Zöldséges-sajtos hidegtál", "category": "Hideg vacsora", "tags": ["hideg vacsora", "vércukorbarát", "frissen ajánlott", "kenyérrel fogyasztható", "savanyúsággal ajánlott"], "servings": "1 adag", "time": "kb. 8 perc", "ingredientsText": "2–3 vékony szelet sajt; bőséges friss zöldség (paprika, paradicsom, uborka, retek, saláta); egy kis adag savanyúság; 1 kisebb szelet teljes kiőrlésű vagy rozskenyér; opcionálisan 1 főtt tojás vagy 1 ek körözött.", "ingredients": ["2–3 vékony szelet sajt", "bőséges friss zöldség (paprika, paradicsom, uborka, retek, saláta)", "egy kis adag savanyúság", "1 kisebb szelet teljes kiőrlésű vagy rozskenyér", "opcionálisan 1 főtt tojás vagy 1 ek körözött."], "steps": ["A zöldségeket mosd meg, és szeleteld fel tetszés szerint.", "Rendezd egy tányérra a sajtot, a zöldségeket és a savanyúságot.", "Tedd mellé az 1 kisebb szelet kenyeret, és ha szeretnéd, egy főtt tojást a több fehérjéért."], "bloodSugarTip": "Tele zöldséggel és sajtfehérjével, minimális szénhidráttal – ideális könnyű, vércukorbarát vacsora.", "digestionTip": "A friss zöldség rostot ad; ha estére érzékeny a gyomrod, válassz inkább paprikát és uborkát a nehezebb nyersek helyett.", "prepOrLeftoverTip": "Tök jó „maradékürítő\" tál: ami friss zöldség itthon van, az mind felhasználható.", "storage": {"freezable": "Nem.", "fridge": "Frissen ajánlott.", "freshRecommended": "Igen.", "nextDayIdea": "A maradék zöldség másnap reggeli szendvicsbe vagy salátába.", "raw": "- Fagyasztható-e: Nem.\n- Hűtőben tartható-e 1–2 napig: Frissen ajánlott.\n- Frissen érdemes-e elkészíteni: Igen.\n- Másnapi felhasználási ötlet: A maradék zöldség másnap reggeli szendvicsbe vagy salátába.\n\n---"}, "rawText": "**Recept ID:** R24\n**Recept neve:** Zöldséges-sajtos hidegtál\n**Kategória:** Hideg vacsora\n**Címkék:** hideg vacsora, vércukorbarát, frissen ajánlott, kenyérrel fogyasztható, savanyúsággal ajánlott\n**Hány adagra készül:** 1 adag\n**Elkészítési idő:** kb. 8 perc\n**Hozzávalók:** 2–3 vékony szelet sajt; bőséges friss zöldség (paprika, paradicsom, uborka, retek, saláta); egy kis adag savanyúság; 1 kisebb szelet teljes kiőrlésű vagy rozskenyér; opcionálisan 1 főtt tojás vagy 1 ek körözött.\n**Elkészítés lépésről lépésre:**\n1. A zöldségeket mosd meg, és szeleteld fel tetszés szerint.\n2. Rendezd egy tányérra a sajtot, a zöldségeket és a savanyúságot.\n3. Tedd mellé az 1 kisebb szelet kenyeret, és ha szeretnéd, egy főtt tojást a több fehérjéért.\n**Vércukorbarát tipp:** Tele zöldséggel és sajtfehérjével, minimális szénhidráttal – ideális könnyű, vércukorbarát vacsora.\n**Emésztésbarát tipp:** A friss zöldség rostot ad; ha estére érzékeny a gyomrod, válassz inkább paprikát és uborkát a nehezebb nyersek helyett.\n**Maradékfelhasználási vagy előkészítési tipp:** Tök jó „maradékürítő\" tál: ami friss zöldség itthon van, az mind felhasználható.\n**Eltarthatóság:**\n- Fagyasztható-e: Nem.\n- Hűtőben tartható-e 1–2 napig: Frissen ajánlott.\n- Frissen érdemes-e elkészíteni: Igen.\n- Másnapi felhasználási ötlet: A maradék zöldség másnap reggeli szendvicsbe vagy salátába.\n\n---"}, {"id": "R25", "name": "Joghurtos-uborkás túró tál", "category": "Hideg vacsora", "tags": ["túrós", "joghurtos", "hideg vacsora", "emésztésbarát", "vércukorbarát", "mediterrán jellegű", "frissen ajánlott"], "servings": "1 adag", "time": "kb. 10 perc", "ingredientsText": "150 g light túró vagy sűrű natúr (görög jellegű) joghurt; fél uborka lereszelve; 1 kis gerezd fokhagyma; friss kapor; csipet só; pár csepp olívaolaj; tálaláshoz friss zöldség és 1 kisebb szelet kenyér.", "ingredients": ["150 g light túró vagy sűrű natúr (görög jellegű) joghurt", "fél uborka lereszelve", "1 kis gerezd fokhagyma", "friss kapor", "csipet só", "pár csepp olívaolaj", "tálaláshoz friss zöldség és 1 kisebb szelet kenyér."], "steps": ["Az uborkát reszeld le, sózd meg, és pár perc után nyomkodd ki a levét.", "Keverd össze a túróval (vagy joghurttal), a reszelt fokhagymával és az apróra vágott kaporral.", "Csepegtess rá kevés olívaolajat, kóstold, igazítsd a sót.", "Tálald friss zöldséggel és 1 kisebb szelet kenyérrel."], "bloodSugarTip": "Magas fehérjetartalmú, friss és könnyű – tökéletes vacsora a vércukor egyenletes tartásához. Tzatziki-jellegű, mediterrán hangulat.", "digestionTip": "A joghurt/túró és az uborka könnyű és hűsítő; jó választás estére, nem terheli a gyomrot.", "prepOrLeftoverTip": "Mártogatósként is működik; a maradékot másnap zöldségekhez kínálhatod.", "storage": {"freezable": "Nem.", "fridge": "1 napig (az uborka levet enged).", "freshRecommended": "Igen.", "nextDayIdea": "Sült húshoz (R20) hideg mártogatós öntetként.", "raw": "- Fagyasztható-e: Nem.\n- Hűtőben tartható-e 1–2 napig: 1 napig (az uborka levet enged).\n- Frissen érdemes-e elkészíteni: Igen.\n- Másnapi felhasználási ötlet: Sült húshoz (R20) hideg mártogatós öntetként.\n\n---"}, "rawText": "**Recept ID:** R25\n**Recept neve:** Joghurtos-uborkás túró tál\n**Kategória:** Hideg vacsora\n**Címkék:** túrós, joghurtos, hideg vacsora, emésztésbarát, vércukorbarát, mediterrán jellegű, frissen ajánlott\n**Hány adagra készül:** 1 adag\n**Elkészítési idő:** kb. 10 perc\n**Hozzávalók:** 150 g light túró vagy sűrű natúr (görög jellegű) joghurt; fél uborka lereszelve; 1 kis gerezd fokhagyma; friss kapor; csipet só; pár csepp olívaolaj; tálaláshoz friss zöldség és 1 kisebb szelet kenyér.\n**Elkészítés lépésről lépésre:**\n1. Az uborkát reszeld le, sózd meg, és pár perc után nyomkodd ki a levét.\n2. Keverd össze a túróval (vagy joghurttal), a reszelt fokhagymával és az apróra vágott kaporral.\n3. Csepegtess rá kevés olívaolajat, kóstold, igazítsd a sót.\n4. Tálald friss zöldséggel és 1 kisebb szelet kenyérrel.\n**Vércukorbarát tipp:** Magas fehérjetartalmú, friss és könnyű – tökéletes vacsora a vércukor egyenletes tartásához. Tzatziki-jellegű, mediterrán hangulat.\n**Emésztésbarát tipp:** A joghurt/túró és az uborka könnyű és hűsítő; jó választás estére, nem terheli a gyomrot.\n**Maradékfelhasználási vagy előkészítési tipp:** Mártogatósként is működik; a maradékot másnap zöldségekhez kínálhatod.\n**Eltarthatóság:**\n- Fagyasztható-e: Nem.\n- Hűtőben tartható-e 1–2 napig: 1 napig (az uborka levet enged).\n- Frissen érdemes-e elkészíteni: Igen.\n- Másnapi felhasználási ötlet: s mustár vagy túrókrém; mellé savanyúság.\n**Elkészítés lépésről lépésre:**\n1. A rozskenyeret vékonyan kend meg mustárral vagy túrókrémmel.\n2. Rétegezd rá a salátalevelet, a sonkát és a felkarikázott zöldségeket.\n3. Tálald egy kis savanyúsággal.\n**Vércukorbarát tipp:** A rozskenyér lassabban szívódik fel, mint a fehér; a sonka fehérjét, a zöldség rostot ad – együtt vércukorbarátabb falat.\n**Emésztésbarát tipp:** Válassz sovány, kevésbé sós sonkát; a sok friss zöldség könnyűvé teszi.\n**Maradékfelhasználási vagy előkészítési tipp:** Gyors, bármikor összeállítható; jó „nincs kedvem főzni\" vacsora vagy reggeli.\n**Eltarthatóság:**\n- Fagyasztható-e: Nem.\n- Hűtőben tartható-e 1–2 napig: Frissen ajánlott.\n- Frissen érdemes-e elkészíteni: Igen.\n- Másnapi felhasználási ötlet: A sonka és zöldség külön eltéve másnap is felhasználható.\n\n---"}, {"id": "R27", "name": "Hideg csirkesaláta", "category": "Hideg vacsora", "tags": ["hideg vacsora", "húsos", "maradékfelhasználásra jó", "vércukorbarát", "frissen ajánlott"], "servings": "1 adag", "time": "kb. 10 perc", "ingredientsText": "a maradék sült csirkemell (R20) felkockázva; saláta, paradicsom, uborka, paprika; öntethez 2 ek natúr joghurt + 1 tk mustár + pár csepp citromlé + só (a majonéz helyett); mellé 1 kisebb szelet kenyér.", "ingredients": ["a maradék sült csirkemell (R20) felkockázva", "saláta, paradicsom, uborka, paprika", "öntethez 2 ek natúr joghurt + 1 tk mustár + pár csepp citromlé + só (a majonéz helyett)", "mellé 1 kisebb szelet kenyér."], "steps": ["A zöldségeket vágd falatnyira egy tálba.", "Add hozzá a felkockázott hideg csirkemellet.", "Keverd össze az öntet hozzávalóit, és forgasd össze vele a salátát.", "Tálald azonnal, mellé 1 kisebb szelet kenyérrel."], "bloodSugarTip": "Majonéz helyett joghurtos öntet – sok fehérje, kevés zsír, alig szénhidrát.", "digestionTip": "Friss, könnyű, mégis laktató; estére is kíméletes.", "prepOrLeftoverTip": "Kifejezetten a sült csirkemell (R20) maradékára épül – semmi shop-w2-rozskenyer-vagy-teljes-kiorlesu-kovaszos-001", "name": "Rozskenyér vagy teljes kiőrlésű kovászos", "amount": "1 vekni", "usedFor": "reggelik, vacsorák (kis szelet)", "rawText": "Rozskenyér vagy teljes kiőrlésű kovászos – 1 vekni – reggelik, vacsorák (kis szelet)", "usedDays": []}]}, {"name": "Savanyúságok", "items": [{"id": "shop-w2-kovaszos-csemege-uborka-savanyu-kaposzta-ecetes-paprika-001", "name": "Kovászos/csemege uborka, savanyú káposzta, ecetes paprika", "amount": "feltétekhez, hidegtálhoz, mellé", "usedFor": "", "rawText": "Kovászos/csemege uborka, savanyú káposzta, ecetes paprika – feltétekhez, hidegtálhoz, mellé", "usedDays": []}]}, {"name": "Fűszerek, egyéb", "items": [{"id": "shop-w2-oliva-repceolaj-keves-ecet-mustar-potlas-ha-kell-001", "name": "Olíva-/repceolaj kevés, ecet, mustár (pótlás, ha kell)", "amount": "", "usedFor": "", "rawText": "Olíva-/repceolaj kevés, ecet, mustár (pótlás, ha kell)", "usedDays": []}]}]}], "adviceSections": [{"id": "rovid-bevezeto", "title": "Rövid bevezető", "type": "guide", "summary": "Kedves Olvasó! Ez egy általános, személyre szabott mintaétrend , amelyet a megadott adataid alapján állítottam össze. A célja, hogy egyszerű, házias, magyaros ételekkel támogasson a lassú, fenntartható fogyásban, az emés", "content": "Kedves Olvasó!\n\nEz egy **általános, személyre szabott mintaétrend**, amelyet a megadott adataid alapján állítottam össze. A célja, hogy egyszerű, házias, magyaros ételekkel támogasson a lassú, fenntartható fogyásban, az emésztés javításában és a vércukor-ingadozás megelőzésében – anélkül, hogy koplalnod kellene vagy bonyolult dolgokat kellene csinálnod.\n\nFontos tudni: **ez nem orvosi vagy dietetikusi tanácsadás, és nem helyettesíti azt.** Egy követhető minta, kiindulási alap. Ha a későbbiekben bármilyen betegség, gyógyszerszedés, rosszullét, magas vércukor vagy tartós emésztési panasz jelentkezik, érdemes szakemberrel (háziorvos, dietetikus) egyeztetni, és az étrendet ennek megfelelően átnézni.\n\nA hangvétel végig barátságos és gyakorlatias. Nem tiltani szeretnék, hanem **okos helyettesítéseket** adni: a kedvenceidnek (levesek, főzelékek, savanyúságok, egy kis kovászos kenyér) itt is van helyük, csak kicsit átgondolt formában. Haladj a magad tempójában – a kis, tartható lépések többet érnek, mint a nagy, betarthatatlan fogadalmak.\n\n---", "highlight": false}, {"id": "rovid-etrendi-alapelvek", "title": "Rövid étrendi alapelvek", "type": "guide", "summary": "Lassú, fenntartható fogyás. A cél nagyjából 5 kg hosszabb távon. Nem koplalás, hanem kicsit kisebb, kiegyensúlyozottabb adagok. A laktató, de nem túl nagy mennyiség a jó irány. Fehérje minden főétkezéshez. Minden reggeli", "content": "- **Lassú, fenntartható fogyás.** A cél nagyjából 5 kg hosszabb távon. Nem koplalás, hanem kicsit kisebb, kiegyensúlyozottabb adagok. A laktató, de nem túl nagy mennyiség a jó irány.\n- **Fehérje minden főétkezéshez.** Minden reggeli, ebéd és vacsora tartalmazzon valamilyen fehérjeforrást (tojás, túró, sajt, kefir, csirke, pulyka, sovány sertés, hüvelyesek). Ez segít jóllakni és egyenletesebben tartani a vércukrot.\n- **Levesek és főzelékek gyakran.** Ezek a kedvenceid, és tökéletesen illenek a célokhoz: laktatók, emésztésbarátok, olcsók, és könnyű belőlük 2–3 napra főzni.\n- **Kenyér mértékkel.** A kovászos fehér kenyér nincs tiltva, de jó, ha kisebb adag, és lehetőleg részben rozsos vagy teljes kiőrlésű kovászosra váltasz. Kenyér mellé mindig legyen fehérje és zöldség.\n- **Savanyúság mértékkel.** Bátran fogyaszd (savanyú káposzta, kovászos/csemege uborka, ecetes paprika), csak ne a legcukrosabb vagy legsósabb boltit válaszd.\n- **Kávé és cukrozott tejpor fokozatos rendezése.** Nem hirtelen elhagyás, hanem lépésről lépésre kevesebb kávé, és a cukrozott tejpor fokozatos cseréje.\n- **Folyadék és rost fokozatos emelése.** Több víz és kicsivel több rost – de szépen, fokozatosan, hogy az emésztés is hálás legyen érte.\n- **Délutáni édességvágy: tervezéssel, nem tiltással.** A délutáni éhségre előre kitalált, kis adagú, fehérje + rost alapú megoldások vannak (külön modulban), nem plusz édesség vagy kenyér.\n\n---", "highlight": false}, {"id": "kave-es-folyadek-javaslat", "title": "Kávé és folyadék javaslat", "type": "guide", "summary": "A kávét nem kell hirtelen elhagyni – ez kényelmetlen lenne és nem is tartható. A cél a fokozatos, kíméletes rendezés. A napi kb. 8 kávé sok, főleg, hogy mellé kevés víz megy; ez együtt ronthatja az alvást és a székrekedé", "content": "A kávét nem kell hirtelen elhagyni – ez kényelmetlen lenne és nem is tartható. A cél a fokozatos, kíméletes rendezés. A napi kb. 8 kávé sok, főleg, hogy mellé kevés víz megy; ez együtt ronthatja az alvást és a székrekedést is.\n\n**Kávémennyiség fokozatos csökkentése**\n\n- 1. hét: a napi 8 kávéból legyen 6. A két „elhagyott\" kávé helyett igyál egy pohár vizet vagy egy csésze gyógyteát.\n- 2. hét: csökkentsd 5-re.\n- Később (ha jólesik): 4 kávé körül. Ez már sokkal kíméletesebb, és a legtöbben itt érzik jól magukat.\n- A reggeli–délelőtti kávékat tartsd meg, ezeket nehezebb nélkülözni; a délutáni-esti kávékat fokozd ki elsőként.\n\n**Cukrozott tejpor fokozatos cseréje** (lépésről lépésre, hogy ne legyen hirtelen)\n\n1. Először felezd meg a cukrozott tejpor mennyiségét.\n2. Utána válts cukrozatlan tejporra.\n3. Majd próbáld ki kevés rendes tejjel.\n4. Végül, ha szeretnéd, cukrozatlan növényi itallal (pl. zabital, mandulaital cukor nélkül).\n\n**Folyadék és a kávé mellé víz**\n\n- Minden kávé mellé igyál fél pohár vizet – ez egyszerű szokás, mégis sokat segít.\n- A vízbevitelt lassan emeld a mostani kb. 1,5 literről 1,8–2 liter felé (ha nincs orvosi ellenjavallat). Tartsd egy üveg vizet látótávolságban.\n- Késő délután és este ne legyen koffeines kávé. Helyette: koffeinmentes kávé, gyógytea (pl. menta, kamilla), vagy citromos/uborkás víz.\n\nA lényeg: kíméletes tempó, semmi tiltás. A kávécsökkentés és a több víz együtt segíti a legtöbbet a székrekedésen és az alváson.\n\n---", "highlight": true}, {"id": "emesztest-segito-napi-szokasok", "title": "Emésztést segítő napi szokások", "type": "guide", "summary": "Reggel indíts 1 pohár langyos vízzel, még a kávé előtt – ez beindítja a bélműködést. Napi 10–20 perc séta, akár két részletben (pl. ebéd után és vacsora előtt). Az alacsony mozgás mellett ez a kis adag is sokat számít az", "content": "- Reggel indíts 1 pohár langyos vízzel, még a kávé előtt – ez beindítja a bélműködést.\n- Napi 10–20 perc séta, akár két részletben (pl. ebéd után és vacsora előtt). Az alacsony mozgás mellett ez a kis adag is sokat számít az emésztésnek és a fogyásnak.\n- Egyél leves vagy főzelék formájában meleg, főtt zöldséget gyakran – ezekre épül az egész étrend.\n- Fogyassz kefirt vagy natúr joghurtot rendszeresen (a krémek, reggelik révén szinte minden nap belefér).\n- Napi 1 tk őrölt lenmagot vagy chiamagot vezess be fokozatosan (pl. a túrós-zabos reggelibe), és igyál mellé bőven vizet.\n- A rostot csak fokozatosan emeld – a hirtelen sok rost puffaszthat. Lassan szoktasd hozzá a szervezeted.\n- Savanyúságot mértékkel, de bátran: a savanyú káposzta és kovászos uborka természetes erjesztett étel, jót tesz a bélflórának.\n- Ha a székrekedés tartósan fennáll vagy romlik, érdemes orvossal egyeztetni.\n\n---", "highlight": false}, {"id": "alvast-tamogato-etkezesi-javaslatok", "title": "Alvást támogató étkezési javaslatok", "type": "guide", "summary": "A rossz alvás és az édességvágy összefügg: ha keveset alszunk, a szervezet másnap jobban kívánja a gyors energiát (édességet, kenyeret). Ezért az alvás támogatása közvetve a fogyást is segíti. Délután és este ne legyen k", "content": "A rossz alvás és az édességvágy összefügg: ha keveset alszunk, a szervezet másnap jobban kívánja a gyors energiát (édességet, kenyeret). Ezért az alvás támogatása közvetve a fogyást is segíti.\n\n- Délután és este ne legyen koffeines kávé – ez az egyik legfontosabb lépés a jobb alvásért.\n- Vacsorára ne egyél túl zsírosat vagy túl nagy adagot; a könnyű, hideg vacsora (krémek, saláták, szendvics) ideális.\n- Lefekvés előtt közvetlenül ne legyen nagyobb étkezés; igyekezz a vacsorát kb. 2–3 órával alvás előtt befejezni.\n- Ha este mégis éhes vagy, válassz valami egészen könnyűt: 1 pohár kefir, vagy egy kis natúr joghurt.\n- A kávé csökkentése és a rendszeresebb folyadékbevitel idővel támogathatja az alvás javulását is.\n\n---", "highlight": false}, {"id": "delutani-ehseg-es-edessegvagy-kezelese", "title": "Délutáni éhség és édességvágy kezelése", "type": "guide", "summary": "A délutáni éhség nálad rendszeres, és ilyenkor jön az édesség és kenyérvágy. A jó hír: nem tiltással, hanem előre megtervezett, kis adagú, fehérje + rost alapú megoldásokkal lehet a legjobban kezelni. Ezek nem kötelező n", "content": "A délutáni éhség nálad rendszeres, és ilyenkor jön az édesség- és kenyérvágy. A jó hír: nem tiltással, hanem előre megtervezett, kis adagú, fehérje + rost alapú megoldásokkal lehet a legjobban kezelni. Ezek **nem kötelező negyedik étkezések** – csak akkor nyúlj hozzájuk, ha valóban éhes vagy.\n\n**„Ha nagyon éhes vagyok\" – vészmegoldások (válassz egyet):**\n\n- 1 pohár kefir\n- 1 alma pár szem dióval\n- natúr joghurt egy csipet fahéjjal\n- 1 főtt tojás egy kis zöldséggel (R06 alapján)\n- egy kevés túró kevés joghurttal\n- egy kis tányér savanyúság + 1 főtt tojás\n- cukormentes tea vagy egy nagy pohár víz – sokszor a szomjúságot érezzük éhségnek\n- séta vagy vízivás egy plusz kávé helyett\n\n**Fontos elv:** ha délután rendszeresen éhes vagy, ne édességgel vagy plusz kenyérrel oldd meg, hanem **fehérje + rost** alapú kis opcióval. A fehérje és a rost sokáig elnyújtja a jóllakottságot, és nem löki meg a vércukrot úgy, mint egy süti vagy egy plusz szelet kenyér. Ha tudod, hogy délután jönni fog az éhség, készíts elő reggel egy kis adag túrót vagy egy főtt tojást – így nem a kísértés dönt helyetted.\n\n---", "highlight": false}, {"id": "cserelehetosegek", "title": "Cserelehetőségek", "type": "guide", "summary": "Ezek egyszerű, vércukorbarátabb cserék, amelyek nem borítják fel a fogyási célt. Bátran variálj a kedved és a kínálat szerint. Reggelik Rántotta (R02) helyett tojáskrém (R01) vagy sajtos zöldséges szendvics (R05). Túrós ", "content": "Ezek egyszerű, vércukorbarátabb cserék, amelyek nem borítják fel a fogyási célt. Bátran variálj a kedved és a kínálat szerint.\n\n**Reggelik**\n\n- Rántotta (R02) helyett tojáskrém (R01) vagy sajtos-zöldséges szendvics (R05).\n- Túrós-zabos reggeli (R07) helyett sós túrókrém (R03) kis szelet rozskenyérrel.\n- Bármelyik reggelihez mindig tegyél friss zöldséget vagy savanyúságot.\n\n**Ebédek**\n\n- Húsos főétel helyett egy tál tartalmas leves (R08, R09) + egy kis fehérje (tojás, sajt).\n- Pörkölt (R18) helyett pulykaragu (R22) vagy sült csirkemell (R20).\n- Köret-csere: barna rizs helyett bulgur, hajdina, köles vagy több párolt zöldség.\n\n**Vacsorák**\n\n- Bármelyik krém (R03, R04, R23) felcserélhető a másikra.\n- Szendvics (R26) helyett zöldséges-sajtos hidegtál (R24) kenyér nélkül vagy kevesebb kenyérrel.\n- A két kivételes meleg vacsora (R10, R15) bármikor cserélhető egy hideg krémre vagy salátára.\n\n**Köretek**\n\n- Burgonya helyett: párolt zöldség, karfiolpüré, kevés barna rizs vagy bulgur.\n- Fehér rizs helyett: barna rizs, hajdina, köles, durumtészta – kisebb adagban.\n\n**Levesek**\n\n- Bármelyik leves helyettesíthető másikkal a heti kínálat szerint (R08–R12).\n- Krémlevesnél a tejszínt mindig joghurttal vagy a saját zöldségével való turmixolással helyettesítsd.\n\n**Főzelékek**\n\n- A főzelékek egymással szabadon cserélhetők (R13–R16); a habarás mindig joghurtos/kefires legyen rántás helyett.\n- Tök, zöldbab, kelkáposzta, spenót – aszerint, ami szezonban friss és olcsó.\n\n**Savanyúságok**\n\n- Bolti, cukrozott savanyúság helyett: kovászos uborka, savanyú káposzta, ecetes paprika kevés cukorral.\n- Ha túl sós egy savanyúság, öblítsd át, vagy egyél mellé több friss zöldséget.\n\n**Nassolás helyetti opciók**\n\n- Édesség/keksz helyett: natúr joghurt fahéjjal, egy alma pár szem dióval, vagy egy kis túró.\n- Sós ropogtatnivaló helyett: friss zöldségcsíkok kefires-zöldfűszeres krémmel (R04).\n\n**Kenyérhelyettesítés / -csökkentés**\n\n- Kovászos fehér kenyér helyett részben rozsos vagy teljes kiőrlésű kovászos kenyér.\n- Étkezésenként általában 1 kisebb szelet, és mindig fehérjével + zöldséggel együtt.\n- Ha lehet, a nap második felében kevesebb kenyér; kenyér helyett néha egy kis adag párolt zöldség vagy saláta.\n\n---", "highlight": false}, {"id": "egyszeru-adagolasi-utmutato", "title": "Egyszerű adagolási útmutató", "type": "guide", "summary": "Nem kell mérleg vagy kalóriaszámolás – ezek a háztartásban jól használható, házias mértékek: Hús: kb. 1 tenyérnyi (tenyér nagyságú és vastagságú) adag. Köret (rizs, bulgur, tészta, burgonya): 3–4 evőkanál. Főzelék: 1 kis", "content": "Nem kell mérleg vagy kalóriaszámolás – ezek a háztartásban jól használható, házias mértékek:\n\n- Hús: kb. 1 tenyérnyi (tenyér nagyságú és vastagságú) adag.\n- Köret (rizs, bulgur, tészta, burgonya): 3–4 evőkanál.\n- Főzelék: 1 kisebb mélytányérnyi.\n- Leves: 1 tányér.\n- Kenyér: 1 kisebb szelet étkezésenként.\n- Sajt: 1–2 vékony szelet.\n- Olaj: étkezésenként kb. 1 teáskanál.\n- Gyümölcs: egyszerre 1 kisebb darab (pl. 1 alma) vagy egy marék bogyós.\n- Savanyúság: 2–3 evőkanál vagy egy kisebb adag.\n- Olajos magvak (dió, mandula): egyszerre egy kis maréknyi (kb. 1 evőkanál).\n\nMivel kis adagokat szeretsz enni, a hangsúly a laktató, fehérjés és rostos összetételen van, nem a nagy mennyiségen.\n\n---", "highlight": false}, {"id": "fontos-tudnivalok", "title": "Fontos tudnivalók", "type": "guide", "summary": "Röviden, ijesztgetés nélkül – ezeket jó észben tartani: Ha a székrekedés tartósan fennáll vagy romlik, érdemes orvossal egyeztetni. Magas vércukor, rosszullét, szédülés vagy szokatlan gyengeség esetén keresd fel az orvos", "content": "Röviden, ijesztgetés nélkül – ezeket jó észben tartani:\n\n- Ha a székrekedés tartósan fennáll vagy romlik, érdemes orvossal egyeztetni.\n- Magas vércukor, rosszullét, szédülés vagy szokatlan gyengeség esetén keresd fel az orvosodat.\n- Ha a későbbiekben gyógyszerszedés indul (különösen vércukor-, vérnyomás-, vízhajtó vagy pajzsmirigygyógyszer), érdemes az étrendet újranézni, mert ezek befolyásolhatják az igényeket.\n- Új betegség vagy friss laboreredmény esetén dietetikussal vagy orvossal jó átbeszélni az étrendet.\n- Ez egy általános, személyre szabott minta, és nem helyettesíti a személyes orvosi vagy dietetikusi tanácsadást. A te szervezeted ismeri a legjobban önmagát – figyeld, mi esik jól, és haladj a saját tempódban.\n\n---", "highlight": true}], "searchIndex": [{"type": "nap", "title": "1. nap Hétfő", "context": "Rántotta zöldséggel [R02] – 2 tojás, paprika, paradicsom Zöldségleves csirkével [R08] – 1 tányér + 1 szelet rozskenyér Körözött light [R23] – 2–3 ek, savanyúság, 1 kis szelet kovászos kenyér A levesből főzz 2–3 napra, te", "target": {"view": "diet", "week": 1, "day": 1}, "searchText": "1. nap hetfo rantotta zoldseggel [r02] – 2 tojas, paprika, paradicsom zoldsegleves csirkevel [r08] – 1 tanyer + 1 szelet rozskenyer korozott light [r23] – 2–3 ek, savanyusag, 1 kis szelet kovaszos kenyer a levesbol fozz 2–3 napra, tedd el a felet"}, {"type": "étkezés", "title": "1. nap Hétfő – Reggeli: Rántotta zöldséggel", "context": "Rántotta zöldséggel [R02] – 2 tojás, paprika, paradicsom", "target": {"view": "diet", "week": 1, "day": 1}, "searchText": "1. nap hetfo – reggeli: rantotta zoldseggel rantotta zoldseggel [r02] – 2 tojas, paprika, paradicsom r02"}, {"type": "étkezés", "title": "1. nap Hétfő – Ebéd: Zöldségleves csirkével", "context": "Zöldségleves csirkével [R08] – 1 tányér + 1 szelet rozskenyér", "target": {"view": "diet", "week": 1, "day": 1}, "searchText": "1. nap hetfo – ebed: zoldsegleves csirkevel zoldsegleves csirkevel [r08] – 1 tanyer + 1 szelet rozskenyer r08"}, {"type": "étkezés", "title": "1. nap Hétfő – Vacsora: Köröz  2 db tojas; egy kis adag savanyusag (kovaszos uborka vagy savanyu kaposzta); friss paprika vagy paradicsom; 1 kisebb szelet kenyer. a tojasokat hideg vizben tedd fel, es forrastol szamitva fozd 8–10 percig kemenyre (ha lagyabban szereted, 6 perc). hideg vizbe teve hutsd, majd pucold meg es vagd felbe. talald savanyusaggal, friss zoldseggel es 1 kisebb szelet kenyerrel. tiszta feherje a tojasbol, gyakorlatilag cukor nelkul; remek, laktato, egyszeru reggeli. a savanyu kaposzta es a kovaszos uborka termeszetes savanyitott etelek, jot tesznek a belfloranak. r06"}, {"type": "hozzávaló", "title": "2 db tojás", "context": "R06 – Főtt tojás savanyúsággal és zöldséggel", "target": {"view": "recipes", "recipeId": "R06"}, "searchText": "2 db tojas fott tojas savanyusaggal es zoldseggel r06"}, {"type": "hozzávaló", "title": "egy kis adag savanyúság (kovászos uborka vagy savanyú káposzta)", "context": "R06 – Főtt tojás savanyúsággal és zöldséggel", "target": {"view": "recipes", "recipeId": "R06"}, "searchText": "egy kis adag savanyusag (kovaszos uborka vagy savanyu kaposzta) fott tojas savanyusaggal es zoldseggel r06"}, {"type": "hozzávaló", "title": "friss paprika vagy paradicsom", "context": "R06 – Főtt tojás savanyúsággal és zöldséggel", "target": {"view": "recipes", "recipeId": "R06"}, "searchText": "friss paprika vagy paradicsom fott tojas savanyusaggal es zoldseggel r06"}, {"type": "hozzávaló", "title": "1 kisebb szelet kenyér.", "context": "R06 – Főtt tojás savanyúsággal és zöldséggel", "target": {"view": "recipes", "recipeId": "R06"}, "searchText": "1 kisebb szelet kenyer. fott tojas savanyusaggal es zoldseggel r06"}, {"type": "recept", "title": "R07 – Túrós-zabos reggeli", "context": "Reggeli · túrós, joghurtos, rostban gazdag, emésztésbarát", "target": {"view": "recipes", "recipeId": "R07"}, "searchText": "turos-zabos reggeli reggeli turos joghurtos rostban gazdag emesztesbarat vercukorbarat 1–2 napig eltarthato 3 ek zabpehely; 1 kis pohar kefir vagy natur joghurt (kb. 1,5 dl); 2–3 ek light turo; 1 tk orolt lenmag; fel alma reszelve vagy egy marek bogyos gyumolcs; csipet fahej. egy talban keverd ossze a zabpelyhet, a kefirt (vagy joghurtot) es a turot. add hozza az orolt lenmagot es a fahejat. keverd bele a reszelt almat vagy a bogyos gyumolcsot. hagyd allni 10 percet (vagy elozo este tedd hutobe), hogy a zab megszivja magat, es kesz. ez az egyetlen kicsit „edesebb\" reggeli – a sok feherje (turo, kefir) es rost (zab, lenmag) miatt megis vercukorbarat. hozzaadott cukor nelkul, a gyumolcs adja az edesseget. a zab, a lenmag es a kefir egyutt kifejezetten segiti a belmukodest es a szekrekedes oldasat – igyal melle egy pohar vizet. r07"}, {"type": "hozzávaló", "title": "3 ek zabpehely", "context": "R07 – Túrós-zabos reggeli", "target": {"view": "recipes", "recipeId": "R07"}, "searchText": "3 ek zabpehely turos-zabos reggeli r07"}, {"type": "hozzávaló", "title": "1 kis pohár kefir vagy natúr joghurt (kb. 1,5 dl)", "context": "R07 – Túrós-zabos reggeli", "target": {"view": "recipes", "recipeId": "R07"}, "searchText": "1 kis pohar kefir vagy natur joghurt (kb. 1,5 dl) turos-zabos reggeli r07"}, {"type": "hozzávaló", "title": "2–3 ek light túró", "context": "R07 – Túrós-zabos reggeli", "target": {"view": "recipes", "recipeId": "R07"}, "searchText": "2–3 ek light turo turos-zabos reggeli r07"}, {"type": "hozzávaló", "title": "1 tk őrölt lenmag", "context": "R07 – Túrós-zabos reggeli", "target": {"view": "recipes", "recipeId": "R07"}, "searchText": "1 tk orolt lenmag turos-zabos reggeli r07"}, {"type": "hozzávaló", "title": "fél alma reszelve vagy egy marék bogyós gyümölcs", "context": "R07 – Túrós-zabos reggeli", "target": {"view": "recipes", "recipeId": "R07"}, "searchText": "fel alma reszelve vagy egy marek bogyos gyumolcs turos-zabos reggeli r07"}, {"type": "hozzávaló", "title": "csipet fahéj.", "context": "R07 – Túrós-zabos reggeli", "target": {"view": "recipes", "recipeId": "R07"}, "searchText": "csipet fahej. turos-zabos reggeli r07"}, {"type": "recept", "title": "R08 – Zöldségleves csirkével", "context": "Leves · leves, magyaros, vércukorbarát, emésztésbarát", "target": {"view": "recipes", "recipeId": "R08"}, "searchText": "zoldsegleves csirkevel leves leves magyaros vercukorbarat emesztesbarat fagyaszthato 1–2 napig eltarthato maradekfelhasznalasra jo 2 db csirkefelsocomb (bor nelkul) vagy kb. 25–30 dkg csirkemell kockazva; 2 sargarepa; 1 petrezselyemgyoker; egy kisebb darab zeller; fel karalabe; 1 fej voroshagyma; egy marek zoldborso vagy zoldbab; 1 baberlevel; so, bors; friss petrezselyemzold. a csirket tedd fel kb. 1,5–2 liter hideg vizbe, es lassan forrald fel. forras utan szedd le a habjat, sozd, dobd bele a baberlevelet. kozben a zoldsegeket pucold meg es karikazd/kockazd fel. tedd a zoldsegeket a leveshez, es gyongyozo forralassal fozd 40–45 perc alatt puhara. a vegen borsozd, szord meg petrezselyemmel. ha szeretnel, a csirkehust kiveve felkockazhatod es visszateheted. tartalmas, megis konnyu fogas; kenyer helyett a sok zoldseg es a hus tolt meg. ha kenyeret eszel hozza, abbol csak 1 kis szelet legyen. a meleg, fott zoldseges leves nagyon kimeletes a gyomornak, es boseges folyadekot ad – ez segiti a szekrekedes oldasat is. r08"}, {"type": "hozzávaló", "title": "2 db csirkefelsőcomb (bőr nélkül) vagy kb. 25–30 dkg csirkemell kockázva", "context": "R08 – Zöldségleves csirkével", "target": {"view": "recipes", "recipeId": "R08"}, "searchText": "2 db csirkefelsocomb (bor nelkul) vagy kb. 25–30 dkg csirkemell kockazva zoldsegleves csirkevel r08"}, {"type": "hozzávaló", "title": "2 sárgarépa", "context": "R08 – Zöldségleves csirkével", "target": {"view": "recipes", "recipeId": "R08"}, "searchText": "2 sargarepa zoldsegleves csirkevel r08"}, {"type": "hozzávaló", "title": "1 petrezselyemgyökér", "context": "R08 – Zöldségleves csirkével", "target": {"view": "recipes", "recipeId": "R08"}, "searchText": "1 petrezselyemgyoker zoldsegleves csirkevel r08"}, {"type": "hozzávaló", "title": "egy kisebb darab zeller", "context": "R08 – Zöldségleves csirkével", "target": {"view": "recipes", "recipeId": "R08"}, "searchText": "egy kisebb darab zeller zoldsegleves csirkevel r08"}, {"type": "hozzávaló", "title": "fél karalábé", "context": "R08 – Zöldségleves csirkével", "target": {"view": "recipes", "recipeId": "R08"}, "searchText": "fel karalabe zoldsegleves csirkevel r08"}, {"type": "hozzávaló", "title": "1 fej vöröshagyma", "context": "R08 – Zöldségleves csirkével", "target": {"view": "recipes", "recipeId": "R08"}, "searchText": "1 fej voroshagyma zoldsegleves csirkevel r08"}, {"type": "hozzávaló", "title": "egy marék zöldborsó vagy zöldbab", "context": "R08 – Zöldségleves csirkével", "target": {"view": "recipes", "recipeId": "R08"}, "searchText": "egy marek zoldborso vagy zoldbab zoldsegleves csirkevel r08"}, {"type": "hozzávaló", "title": "1 babérlevél", "context": "R08 – Zöldségleves csirkével", "target": {"view": "recipes", "recipeId": "R08"}, "searchText": "1 baberlevel zoldsegleves csirkevel r08"}, {"type": "hozzávaló", "title": "só, bors", "context": "R08 – Zöldségleves csirkével", "target": {"view": "recipes", "recipeId": "R08"}, "searchText": "so, bors zoldsegleves csirkevel r08"}, {"type": "hozzávaló", "title": "friss petrezselyemzöld.", "context": "R08 – Zöldségleves csirkével", "target": {"view": "recipes", "recipeId": "R08"}, "searchText": "friss petrezselyemzold. zoldsegleves csirkevel r08"}, {"type": "recept", "title": "R09 – Lencseleves könnyítve", "context": "Leves · leves, magyaros, rostban gazdag, emésztésbarát", "target": {"view": "recipes", "recipeId": "R09"}, "searchText": "lencseleves konnyitve leves leves magyaros rostban gazdag emesztesbarat vercukorbarat fagyaszthato maradekfelhasznalasra jo 1,5 dl barna vagy zold lencse; 1 sargarepa; fel fej voroshagyma; 1 gerezd fokhagyma; 1 baberlevel; fel tk pirospaprika; 1 tk olaj; keves ecet vagy citromle; so, bors; suriteshez 1 ek zabpehelyliszt (vagy a leves egy reszenek puresitese). a lencset oblitsd at (barna/zold lencset nem kotelezo aztatni). egy labasban 1 tk olajon futtasd meg az aprora vagott hagymat, add hozza a reszelt fokhagymat es a pirospaprikat, gyorsan keverd el (ne egjen meg). ontsd fel kb. 7–8 dl vizzel, add hozza a lencset, a karikazott repat es a baberlevelet. fozd 25–30 perc alatt puhara. surites rantas nelkul: vagy merits ki egy keveset es turmixold simara, majd ontsd vissza; vagy keverj el 1 ek zabpehellisztet keves hideg vizzel, es azzal suritsd. forrald ossze 2–3 percig. a vegen izesitsd keves ecettel vagy citromlevel, sozd, borsozd. a lencse lassan felszivodo szenhidrat es novenyi feherje egyben – jol tartja a vercukrot. kenyeret csak keveset egyel melle. nagyon rostgazdag, ezert eleinte kisebb adaggal kezdd, es igyal melle boven vizet. ha erzekenyebb vagy ra, a hagymat finomra vagd, es jol fozd puhara. r09"}, {"type": "hozzávaló", "title": "1,5 dl barna vagy zöld lencse", "context": "R09 – Lencseleves könnyítve", "target": {"view": "recipes", "recipeId": "R09"}, "searchText": "1,5 dl barna vagy zold lencse lencseleves konnyitve r09"}, {"type": "hozzávaló", "title": "1 sárgarépa", "context": "R09 – Lencseleves könnyítve", "target": {"view": "recipes", "recipeId": "R09"}, "searchText": "1 sargarepa lencseleves konnyitve r09"}, {"type": "hozzávaló", "title": "fél fej vöröshagyma", "context": "R09 – Lencseleves könnyítve", "target": {"view": "recipes", "recipeId": "R09"}, "searchText": "fel fej voroshagyma lencseleves konnyitve r09"}, {"type": "hozzávaló", "title": "1 gerezd fokhagyma", "context": "R09 – Lencseleves könnyítve", "target": {"view": "recipes", "recipeId": "R09"}, "searchText": "1 gerezd fokhagyma lencseleves konnyitve r09"}, {"type": "hozzávaló", "title": "1 babérlevél", "context": "R09 – Lencseleves könnyítve", "target": {"view": "recipes", "recipeId": "R09"}, "searchText": "1 baberlevel lencseleves konnyitve r09"}, {"type": "hozzávaló", "title": "fél tk pirospaprika", "context": "R09 – Lencseleves könnyítve", "target": {"view": "recipes", "recipeId": "R09"}, "searchText": "fel tk pirospaprika lencseleves konnyitve r09"}, {"type": "hozzávaló", "title": "1 tk olaj", "context": "R09 – Lencseleves könnyítve", "target": {"view": "recipes", "recipeId": "R09"}, "searchText": "1 tk olaj lencseleves konnyitve r09"}, {"type": "hozzávaló", "title": "kevés ecet vagy citromlé", "context": "R09 – Lencseleves könnyítve", "target": {"view": "recipes", "recipeId": "R09"}, "searchText": "keves ecet vagy citromle lencseleves konnyitve r09"}, {"type": "hozzávaló", "title": "só, bors", "context": "R09 – Lencseleves könnyítve", "target": {"view": "recipes", "recipeId": "R09"}, "searchText": "so, bors lencseleves konnyitve r09"}, {"type": "hozzávaló", "title": "sűrítéshez 1 ek zabpehelyliszt (vagy a leves egy részének pürésítése).", "context": "R09 – Lencseleves könnyítve", "target": {"view": "recipes", "recipeId": "R09"}, "searchText": "suriteshez 1 ek zabpehelyliszt (vagy a leves egy reszenek puresitese). lencseleves konnyitve r09"}, {"type": "recept", "title": "R10 – Karfiolkrémleves", "context": "Leves · leves, krémleves, vércukorbarát, emésztésbarát", "target": {"view": "recipes", "recipeId": "R10"}, "searchText": "karfiolkremleves leves leves kremleves vercukorbarat emesztesbarat keves olajjal fagyaszthato 1–2 napig eltarthato 1 kisebb fej karfiol rozsaira szedve; 1 kisebb burgonya (a kremes allaghoz); 1 sargarepa; fel fej voroshagyma; 1 tk olaj; csipet szerecsendio; so, bors; a vegere 2–3 ek natur joghurt vagy egy keves tej. egy labasban 1 tk olajon futtasd meg az aprora vagott hagymat 1–2 percig. add hozza a felkockazott burgonyat, repat es a karfiolrozsakat, keverd at. onts ra annyi vizet, hogy ellepje, sozd, es fozd 18–20 perc alatt puhara. botmixerrel turmixold teljesen simara – ez adja a kremes allagot, rantas nelkul. vedd le a tuzrol, keverd bele a joghurtot vagy tejet (forrald mar ne, hogy ne csapodjon ki), fuszerezd szerecsendioval, borssal. a surites zoldsegbol (burgonya, karfiol) es turmixolasbol jon, nem lisztes rantasbol – igy konnyebb es vercukorbaratabb. a turmixolt, meleg kremleves nagyon konnyu a gyomornak; a karfiolt jol fozd puhara, hogy ne puffasszon. r10"}, {"type": "hozzávaló", "title": "1 kisebb fej karfiol rózsáira szedve", "context": "R10 – Karfiolkrémleves", "target": {"view": "recipes", "recipeId": "R10"}, "searchText": "1 kisebb fej karfiol rozsaira szedve karfiolkremleves r10"}, {"type": "hozzávaló", "title": "1 kisebb burgonya (a krémes állaghoz)", "context": "R10 – Karfiolkrémleves", "target": {"view": "recipes", "recipeId": "R10"}, "searchText": "1 kisebb burgonya (a kremes allaghoz) karfiolkremleves r10"}, {"type": "hozzávaló", "title": "1 sárgarépa", "context": "R10 – Karfiolkrémleves", "target": {"view": "recipes", "recipeId": "R10"}, "searchText": "1 sargarepa karfiolkremleves r10"}, {"type": "hozzávaló", "title": "fél fej vöröshagyma", "context": "R10 – Karfiolkrémleves", "target": {"view": "recipes", "recipeId": "R10"}, "searchText": "fel fej voroshagyma karfiolkremleves r10"}, {"type": "hozzávaló", "title": "1 tk olaj", "context": "R10 – Karfiolkrémleves", "target": {"view": "recipes", "recipeId": "R10"}, "searchText": "1 tk olaj karfiolkremleves r10"}, {"type": "hozzávaló", "title": "csipet szerecsendió", "context": "R10 – Karfiolkrémleves", "target": {"view": "recipes", "recipeId": "R10"}, "searchText": "csipet szerecsendio karfiolkremleves r10"}, {"type": "hozzávaló", "title": "só, bors", "context": "R10 – Karfiolkrémleves", "target": {"view": "recipes", "recipeId": "R10"}, "searchText": "so, bors karfiolkremleves r10"}, {"type": "hozzávaló", "title": "a végére 2–3 ek natúr joghurt vagy egy kevés tej.", "context": "R10 – Karfiolkrémleves", "target": {"view": "recipes", "recipeId": "R10"}, "searchText": "a vegere 2–3 ek natur joghurt vagy egy keves tej. karfiolkremleves r10"}, {"type": "recept", "title": "R11 – Zöldborsóleves", "context": "Leves · leves, magyaros, emésztésbarát, vércukorbarát", "target": {"view": "recipes", "recipeId": "R11"}, "searchText": "zoldborsoleves leves leves magyaros emesztesbarat vercukorbarat fagyaszthato 1–2 napig eltarthato 40–50 dkg zoldborso (friss vagy fagyasztott); 1 sargarepa; fel fej voroshagyma; 1 tk olaj; friss petrezselyem; so, bors; suriteshez joghurtos habaras (2 ek natur joghurt + 1 tk teljes kiorlesu liszt). 1 tk olajon futtasd meg az aprora vagott hagymat es a kockazott repat 2–3 percig. add hozza a zoldborsot, onts ra kb. 7 dl vizet, sozd. fozd 15–18 perc alatt puhara. habaras rantas nelkul: a joghurtot keverd simara a liszttel, lazitsd fel par kanal meleg levessel, majd ontsd vissza a leveshez, es forrald ossze 2–3 percig, kozben kevergetve. borsozd, szord meg petrezselyemmel. a joghurtos habaras kevesebb zsir es liszt, mint a klasszikus rantas – konnyebb es vercukorbaratabb. egy fott tojassal vagy kis sajttal komplett ebed. konnyu, zoldseges leves; ha a borso heja zavar, a leves felet turmixolhatod simabbra. r11"}, {"type": "hozzávaló", "title": "40–50 dkg zöldborsó (friss vagy fagyasztott)", "context": "R11 – Zöldborsóleves", "target": {"view": "recipes", "recipeId": "R11"}, "searchText": "40–50 dkg zoldborso (friss vagy fagyasztott) zoldborsoleves r11"}, {"type": "hozzávaló", "title": "1 sárgarépa", "context": "R11 – Zöldborsóleves", "target": {"view": "recipes", "recipeId": "R11"}, "searchText": "1 sargarepa zoldborsoleves r11"}, {"type": "hozzávaló", "title": "fél fej vöröshagyma", "context": "R11 – Zöldborsóleves", "target": {"view": "recipes", "recipeId": "R11"}, "searchText": "fel fej voroshagyma zoldborsoleves r11"}, {"type": "hozzávaló", "title": "1 tk olaj", "context": "R11 – Zöldborsóleves", "target": {"view": "recipes", "recipeId": "R11"}, "searchText": "1 tk olaj zoldborsoleves r11"}, {"type": "hozzávaló", "title": "friss petrezselyem", "context": "R11 – Zöldborsóleves", "target": {"view": "recipes", "recipeId": "R11"}, "searchText": "friss petrezselyem zoldborsoleves r11"}, {"type": "hozzávaló", "title": "só, bors", "context": "R11 – Zöldborsóleves", "target": {"view": "recipes", "recipeId": "R11"}, "searchText": "so, bors zoldborsoleves r11"}, {"type": "hozzávaló", "title": "sűrítéshez joghurtos habarás (2 ek natúr joghurt + 1 tk teljes kiőrlésű liszt).", "context": "R11 – Zöldborsóleves", "target": {"view": "recipes", "recipeId": "R11"}, "searchText": "suriteshez joghurtos habaras (2 ek natur joghurt + 1 tk teljes kiorlesu liszt). zoldborsoleves r11"}, {"type": "recept", "title": "R12 – Paradicsomleves (teljes kiőrlésű tésztával)", "context": "Leves · leves, magyaros, mediterrán jellegű, vércukorbarát", "target": {"view": "recipes", "recipeId": "R12"}, "searchText": "paradicsomleves (teljes kiorlesu tesztaval) leves leves magyaros mediterran jellegu vercukorbarat 1–2 napig eltarthato fagyaszthato 1 doboz hamozott paradicsom (vagy 5–6 erett friss paradicsom) + 1 ek paradicsompure; fel fej voroshagyma; 1 gerezd fokhagyma; 1 tk olivaolaj; friss vagy szaritott bazsalikom; so, bors; talalashoz 2–3 ek fott teljes kiorlesu teszta adagonkent es keves reszelt sajt. 1 tk olivaolajon futtasd meg az aprora vagott hagymat es fokhagymat 2 percig. add hozza a paradicsomot es a paradicsompuret, onts ra kb. 6 dl vizet. sozd, es fozd 15–18 percig. botmixerrel turmixold simara, izesitsd bazsalikommal, borssal. (cukor helyett a hosszabb fozes es a hagyma hozza az edeskes izt.) talalaskor tegyel a tanyerba 2–3 ek fott teljes kiorlesu tesztat, es szord meg keves sajttal a feherjeert. a bolti paradicsomlevesek gyakran cukrozottak – ez nem az. a teljes kiorlesu tesztabol csak par kanal kerul bele, igy vercukorbarat marad. a turmixolt paradicsom konnyu; ha savas a gyomrod, fozd kicsit tovabb, es tegyel bele egy kis reszelt repat a lagyabb izert. r12"}, {"type": "hozzávaló", "title": "1 doboz hámozott paradicsom (vagy 5–6 érett friss paradicsom) + 1 ek paradicsomp", "context": "R12 – Paradicsomleves (teljes kiőrlésű tésztával)", "target": {"view": "recipes", "recipeId": "R12"}, "searchText": "1 doboz ham "shopping", "week": 2}, "searchText": "oliva-/repceolaj keves, ecet, mustar (potlas, ha kell)   fuszerek, egyeb"}, {"type": "útmutató", "title": "Rövid bevezető", "context": "Kedves Olvasó! Ez egy általános, személyre szabott mintaétrend , amelyet a megadott adataid alapján állítottam össze. A célja, hogy egyszerű, házias, magyaros ételekkel támogasson a lassú, fenntartható fogyásban, az emés", "target": {"view": "guide", "sectionId": "rovid-bevezeto"}, "searchText": "rovid bevezeto kedves olvaso!\n\nez egy **altalanos, szemelyre szabott mintaetrend**, amelyet a megadott adataid alapjan allitottam ossze. a celja, hogy egyszeru, hazias, magyaros etelekkel tamogasson a lassu, fenntarthato fogyasban, az emesztes javitasaban es a vercukor-ingadozas megelozeseben – anelkul, hogy koplalnod kellene vagy bonyolult dolgokat kellene csinalnod.\n\nfontos tudni: **ez nem orvosi vagy dietetikusi tanacsadas, es nem helyettesiti azt.** egy kovetheto minta, kiindulasi alap. ha a kesobbiekben barmilyen betegseg, gyogyszerszedes, rosszullet, magas vercukor vagy tartos emesztesi panasz jelentkezik, erdemes szakemberrel (haziorvos, dietetikus) egyeztetni, es az etrendet ennek megfeleloen atnezni.\n\na hangvetel vegig baratsagos es gyakorlatias. nem tiltani szeretnek, hanem **okos helyettesiteseket** adni: a kedvenceidnek (levesek, fozelekek, savanyusagok, egy kis kovaszos kenyer) itt is van helyuk, csak kicsit atgondolt formaban. haladj a magad tempojaban – a kis, tarthato lepesek tobbet ernek, mint a nagy, betarthatatlan fogadalmak.\n\n---"}, {"type": "útmutató", "title": "Rövid étrendi alapelvek", "context": "Lassú, fenntartható fogyás. A cél nagyjából 5 kg hosszabb távon. Nem koplalás, hanem kicsit kisebb, kiegyensúlyozottabb adagok. A laktató, de nem túl nagy mennyiség a jó irány. Fehérje minden főétkezéshez. Minden reggeli", "target": {"view": "guide", "sectionId": "rovid-etrendi-alapelvek"}, "searchText": "rovid etrendi alapelvek - **lassu, fenntarthato fogyas.** a cel nagyjabol 5 kg hosszabb tavon. nem koplalas, hanem kicsit kisebb, kiegyensulyozottabb adagok. a laktato, de nem tul nagy mennyiseg a jo irany.\n- **feherje minden foetkezeshez.** minden reggeli, ebed es vacsora tartalmazzon valamilyen feherjeforrast (tojas, turo, sajt, kefir, csirke, pulyka, sovany sertes, huvelyesek). ez segit jollakni es egyenletesebben tartani a vercukrot.\n- **levesek es fozelekek gyakran.** ezek a kedvenceid, es tokeletesen illenek a celokhoz: laktatok, emesztesbaratok, olcsok, es konnyu beloluk 2–3 napra fozni.\n- **kenyer mertekkel.** a kovaszos feher kenyer nincs tiltva, de jo, ha kisebb adag, es lehetoleg reszben rozsos vagy teljes kiorlesu kovaszosra valtasz. kenyer melle mindig legyen feherje es zoldseg.\n- **savanyusag mertekkel.** batran fogyaszd (savanyu kaposzta, kovaszos/csemege uborka, ecetes paprika), csak ne a legcukrosabb vagy legsosabb boltit valaszd.\n- **kave es cukrozott tejpor fokozatos rendezese.** nem hirtelen elhagyas, hanem lepesrol lepesre kevesebb kave, es a cukrozott tejpor fokozatos csereje.\n- **folyadek es rost fokozatos emelese.** tobb viz es kicsivel tobb rost – de szepen, fokozatosan, hogy az emesztes is halas legyen erte.\n- **delutani edessegvagy: tervezessel, nem tiltassal.** a delutani ehsegre elore kitalalt, kis adagu, feherje + rost alapu megoldasok vannak (kulon modulban), nem plusz edesseg vagy kenyer.\n\n---"}, {"type": "útmutató", "title": "Kávé és folyadék javaslat", "context": "A kávét nem kell hirtelen elhagyni – ez kényelmetlen lenne és nem is tartható. A cél a fokozatos, kíméletes rendezés. A napi kb. 8 kávé sok, főleg, hogy mellé kevés víz megy; ez együtt ronthatja az alvást és a székrekedé", "target": {"view": "guide", "sectionId": "kave-es-folyadek-javaslat"}, "searchText": "kave es folyadek javaslat a kavet nem kell hirtelen elhagyni – ez kenyelmetlen lenne es nem is tarthato. a cel a fokozatos, kimeletes rendezes. a napi kb. 8 kave sok, foleg, hogy melle keves viz megy; ez egyutt ronthatja az alvast es a szekrekedest is.\n\n**kavemennyiseg fokozatos csokkentese**\n\n- 1. het: a napi 8 kavebol legyen 6. a ket „elhagyott\" kave helyett igyal egy pohar vizet vagy egy csesze gyogyteat.\n- 2. het: csokkentsd 5-re.\n- kesobb (ha jolesik): 4 kave korul. ez mar sokkal kimeletesebb, es a legtobben itt erzik jol magukat.\n- a reggeli–delelotti kavekat tartsd meg, ezeket nehezebb nelkulozni; a delutani-esti kavekat fokozd ki elsokent.\n\n**cukrozott tejpor fokozatos csereje** (lepesrol lepesre, hogy ne legyen hirtelen)\n\n1. eloszor felezd meg a cukrozott tejpor mennyiseget.\n2. utana valts cukrozatlan tejporra.\n3. majd probald ki keves rendes tejjel.\n4. vegul, ha szeretned, cukrozatlan novenyi itallal (pl. zabital, mandulaital cukor nelkul).\n\n**folyadek es a kave melle viz**\n\n- minden kave melle igyal fel pohar vizet – ez egyszeru szokas, megis sokat segit.\n- a vizbevitelt lassan emeld a mostani kb. 1,5 literrol 1,8–2 liter fele (ha nincs orvosi ellenjavallat). tartsd egy uveg vizet latotavolsagban.\n- keso delutan es este ne legyen koffeines kave. helyette: koffeinmentes kave, gyogytea (pl. menta, kamilla), vagy citromos/uborkas viz.\n\na lenyeg: kimeletes tempo, semmi tiltas. a kavecsokkentes es a tobb viz egyutt segiti a legtobbet a szekrekedesen es az alvason.\n\n---"}, {"type": "útmutató", "title": "Emésztést segítő napi szokások", "context": "Reggel indíts 1 pohár langyos vízzel, még a kávé előtt – ez beindítja a bélműködést. Napi 10–20 perc séta, akár két részletben (pl. ebéd után és vacsora előtt). Az alacsony mozgás mellett ez a kis adag is sokat számít az", "target": {"view": "guide", "sectionId": "emesztest-segito-napi-szokasok"}, "searchText": "emesztest segito napi szokasok - reggel indits 1 pohar langyos vizzel, meg a kave elott – ez beinditja a belmukodest.\n- napi 10–20 perc seta, akar ket reszletben (pl. ebed utan es vacsora elott). az alacsony mozgas mellett ez a kis adag is sokat szamit az emesztesnek es a fogyasnak.\n- egyel leves vagy fozelek formajaban meleg, fott zoldseget gyakran – ezekre epul az egesz etrend.\n- fogyassz kefirt vagy natur joghurtot rendszeresen (a kremek, reggelik reven szinte minden nap belefer).\n- napi 1 tk orolt lenmagot vagy chiamagot vezess be fokozatosan (pl. a turos-zabos reggelibe), es igyal melle boven vizet.\n- a rostot csak fokozatosan emeld – a hirtelen sok rost puffaszthat. lassan szoktasd hozza a szervezeted.\n- savanyusagot mertekkel, de batran: a savanyu kaposzta es kovaszos uborka termeszetes erjesztett etel, jot tesz a belfloranak.\n- ha a szekrekedes tartosan fennall vagy romlik, erdemes orvossal egyeztetni.\n\n---"}, {"type": "útmutató", "title": "Alvást támogató étkezési javaslatok", "context": "A rossz alvás és az édességvágy összefügg: ha keveset alszunk, a szervezet másnap jobban kívánja a gyors energiát (édességet, kenyeret). Ezért az alvás támogatása közvetve a fogyást is segíti. Délután és este ne legyen k", "target": {"view": "guide", "sectionId": "alvast-tamogato-etkezesi-javaslatok"}, "searchText": "alvast tamogato etkezesi javaslatok a rossz alvas es az edessegvagy osszefugg: ha keveset alszunk, a szervezet masnap jobban kivanja a gyors energiat (edesseget, kenyeret). ezert az alvas tamogatasa kozvetve a fogyast is segiti.\n\n- delutan es este ne legyen koffeines kave – ez az egyik legfontosabb lepes a jobb alvasert.\n- vacsorara ne egyel tul zsirosat vagy tul nagy adagot; a konnyu, hideg vacsora (kremek, salatak, szendvics) idealis.\n- lefekves elott kozvetlenul ne legyen nagyobb etkezes; igyekezz a vacsorat kb. 2–3 oraval alvas elott befejezni.\n- ha este megis ehes vagy, valassz valami egeszen konnyut: 1 pohar kefir, vagy egy kis natur joghurt.\n- a kave csokkentese es a rendszeresebb folyadekbevitel idovel tamogathatja az alvas javulasat is.\n\n---"}, {"type": "útmutató", "title": "Délutáni éhség és édességvágy kezelése", "context": "A délutáni éhség nálad rendszeres, és ilyenkor jön az édesség és kenyérvágy. A jó hír: nem tiltással, hanem előre megtervezett, kis adagú, fehérje + rost alapú megoldásokkal lehet a legjobban kezelni. Ezek nem kötelező n", "target": {"view": "guide", "sectionId": "delutani-ehseg-es-edessegvagy-kezelese"}, "searchText": "delutani ehseg es edessegvagy kezelese a delutani ehseg nalad rendszeres, es ilyenkor jon az edesseg- es kenyervagy. a jo hir: nem tiltassal, hanem elore megtervezett, kis adagu, feherje + rost alapu megoldasokkal lehet a legjobban kezelni. ezek **nem kotelezo negyedik etkezesek** – csak akkor nyulj hozzajuk, ha valoban ehes vagy.\n\n**„ha nagyon ehes vagyok\" – veszmegoldasok (valassz egyet):**\n\n- 1 pohar kefir\n- 1 alma par szem dioval\n- natur joghurt egy csipet fahejjal\n- 1 fott tojas egy kis zoldseggel (r06 alapjan)\n- egy keves turo keves joghurttal\n- egy kis tanyer savanyusag + 1 fott tojas\n- cukormentes tea vagy egy nagy pohar viz – sokszor a szomjusagot erezzuk ehsegnek\n- seta vagy vizivas egy plusz kave helyett\n\n**fontos elv:** ha delutan rendszeresen ehes vagy, ne edesseggel vagy plusz kenyerrel oldd meg, hanem **feherje + rost** alapu kis opcioval. a feherje es a rost sokaig elnyujtja a jollakottsagot, es nem loki meg a vercukrot ugy, mint egy suti vagy egy plusz szelet kenyer. ha tudod, hogy delutan jonni fog az ehseg, keszits elo reggel egy kis adag turot vagy egy fott tojast – igy nem a kisertes dont helyetted.\n\n---"}, {"type": "útmutató", "title": "Cserelehetőségek", "context": "Ezek egyszerű, vércukorbarátabb cserék, amelyek nem borítják fel a fogyási célt. Bátran variálj a kedved és a kínálat szerint. Reggelik Rántotta (R02) helyett tojáskrém (R01) vagy sajtos zöldséges szendvics (R05). Túrós ", "target": {"view": "guide", "sectionId": "cserelehetosegek"}, "searchText": "cserelehetosegek ezek egyszeru, vercukorbaratabb cserek, amelyek nem boritjak fel a fogyasi celt. batran varialj a kedved es a kinalat szerint.\n\n**reggelik**\n\n- rantotta (r02) helyett tojaskrem (r01) vagy sajtos-zoldseges szendvics (r05).\n- turos-zabos reggeli (r07) helyett sos turokrem (r03) kis szelet rozskenyerrel.\n- barmelyik reggelihez mindig tegyel friss zoldseget vagy savanyusagot.\n\n**ebedek**\n\n- husos foetel helyett egy tal tartalmas leves (r08, r09) + egy kis feherje (tojas, sajt).\n- porkolt (r18) helyett pulykaragu (r22) vagy sult csirkemell (r20).\n- koret-csere: barna rizs helyett bulgur, hajdina, koles vagy tobb parolt zoldseg.\n\n**vacsorak**\n\n- barmelyik krem (r03, r04, r23) felcserelheto a masikra.\n- szendvics (r26) helyett zoldseges-sajtos hidegtal (r24) kenyer nelkul vagy kevesebb kenyerrel.\n- a ket kiveteles meleg vacsora (r10, r15) barmikor cserelheto egy hideg kremre vagy salatara.\n\n**koretek**\n\n- burgonya helyett: parolt zoldseg, karfiolpure, keves barna rizs vagy bulgur.\n- feher rizs helyett: barna rizs, hajdina, koles, durumteszta – kisebb adagban.\n\n**levesek**\n\n- barmelyik leves helyettesitheto masikkal a heti kinalat szerint (r08–r12).\n- kremlevesnel a tejszint mindig joghurttal vagy a sajat zoldsegevel valo turmixolassal helyettesitsd.\n\n**fozelekek**\n\n- a fozelekek egymassal szabadon cserelhetok (r13–r16); a habaras mindig joghurtos/kefires legyen rantas helyett.\n- tok, zoldbab, kelkaposzta, spenot – aszerint, ami szezonban friss es olcso.\n\n**savanyusagok**\n\n- bolti, cukrozott savanyusag helyett: kovaszos uborka, savanyu kaposzta, ecetes paprika keves cukorral.\n- ha tul sos egy savanyusag, oblitsd at, vagy egyel melle tobb friss zoldseget.\n\n**nassolas helyetti opciok**\n\n- edesseg/keksz helyett: natur joghurt fahejjal, egy alma par szem dioval, vagy egy kis turo.\n- sos ropogtatnivalo helyett: friss zoldsegcsikok kefires-zoldfuszeres kremmel (r04).\n\n**kenyerhelyettesites / -csokkentes**\n\n- kovaszos feher kenyer helyett reszben rozsos vagy teljes kiorlesu kovaszos kenyer.\n- etkezesenkent altalaban 1 kisebb szelet, es mindig feherjevel + zoldseggel egyutt.\n- ha lehet, a nap masodik feleben kevesebb kenyer; kenyer helyett neha egy kis adag parolt zoldseg vagy salata.\n\n---"}, {"type": "útmutató", "title": "Egyszerű adagolási útmutató", "context": "Nem kell mérleg vagy kalóriaszámolás – ezek a háztartásban jól használható, házias mértékek: Hús: kb. 1 tenyérnyi (tenyér nagyságú és vastagságú) adag. Köret (rizs, bulgur, tészta, burgonya): 3–4 evőkanál. Főzelék: 1 kis", "target": {"view": "guide", "sectionId": "egyszeru-adagolasi-utmutato"}, "searchText": "egyszeru adagolasi utmutato nem kell merleg vagy kaloriaszamolas – ezek a haztartasban jol hasznalhato, hazias mertekek:\n\n- hus: kb. 1 tenyernyi (tenyer nagysagu es vastagsagu) adag.\n- koret (rizs, bulgur, teszta, burgonya): 3–4 evokanal.\n- fozelek: 1 kisebb melytanyernyi.\n- leves: 1 tanyer.\n- kenyer: 1 kisebb szelet etkezesenkent.\n- sajt: 1–2 vekony szelet.\n- olaj: etkezesenkent kb. 1 teaskanal.\n- gyumolcs: egyszerre 1 kisebb darab (pl. 1 alma) vagy egy marek bogyos.\n- savanyusag: 2–3 evokanal vagy egy kisebb adag.\n- olajos magvak (dio, mandula): egyszerre egy kis mareknyi (kb. 1 evokanal).\n\nmivel kis adagokat szeretsz enni, a hangsuly a laktato, feherjes es rostos osszetetelen van, nem a nagy mennyisegen.\n\n---"}, {"type": "útmutató", "title": "Fontos tudnivalók", "context": "Röviden, ijesztgetés nélkül – ezeket jó észben tartani: Ha a székrekedés tartósan fennáll vagy romlik, érdemes orvossal egyeztetni. Magas vércukor, rosszullét, szédülés vagy szokatlan gyengeség esetén keresd fel az orvos", "target": {"view": "guide", "sectionId": "fontos-tudnivalok"}, "searchText": "fontos tudnivalok roviden, ijesztgetes nelkul – ezeket jo eszben tartani:\n\n- ha a szekrekedes tartosan fennall vagy romlik, erdemes orvossal egyeztetni.\n- magas vercukor, rosszullet, szedules vagy szokatlan gyengeseg eseten keresd fel az orvosodat.\n- ha a kesobbiekben gyogyszerszedes indul (kulonosen vercukor-, vernyomas-, vizhajto vagy pajzsmirigygyogyszer), erdemes az etrendet ujranezni, mert ezek befolyasolhatjak az igenyeket.\n- uj betegseg vagy friss laboreredmeny eseten dietetikussal vagy orvossal jo atbeszelni az etrendet.\n- ez egy altalanos, szemelyre szabott minta, es nem helyettesiti a szemelyes orvosi vagy dietetikusi tanacsadast. a te szervezeted ismeri a legjobban onmagat – figyeld, mi esik jol, es haladj a sajat tempodban.\n\n---"}], "processingNotes": []};

function escapeHtml(s=''){ return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function normalize(s=''){ return String(s).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[őö]/g,'o').replace(/[űü]/g,'u'); }

function cleanText(s=''){
  return String(s)
    .replace(/\s*\[[Rr]\d{2}\]/g,'')
    .replace(/\s*\([Rr]\d{2}\)/g,'')
    .replace(/[Rr]\d{2}\s*[–-]\s*/g,'')

}

function mdInline(s=''){ return escapeHtml(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>'); }
function mdToHtml(md=''){
  const lines=String(md).split(/\n/); let html='', inList=false, inQuote=false;
  function closeList(){ if(inList){html+='</ul>'; inList=false;} }
  for(let raw of lines){ let line=raw.trim();
    if(!line){ closeList(); if(inQuote){html+='</blockquote>'; inQuote=false;} continue; }
    if(line==='---'){ closeList(); html+='<hr>'; continue; }
    if(line.startsWith('>')){ closeList(); if(!inQuote){html+='<blockquote>'; inQuote=true;} html+='<p>'+mdInline(line.replace(/^>\s*/,''))+'</p>'; continue; }
    if(inQuote){html+='</blockquote>'; inQuote=false;}
    if(/^#{3,}\s+/.test(line)){ closeList(); html+='<h3>'+mdInline(line.replace(/^#{3,}\s*/,''))+'</h3>'; continue; }
    if(/^[-*]\s+/.test(line)){ if(!inList){html+='<ul>'; inList=true;} html+='<li>'+mdInline(line.replace(/^[-*]\s+/,''))+'</li>'; continue; }
    closeList(); html+='<p>'+mdInline(line)+'</p>';
  }
  closeList(); if(inQuote) html+='</blockquote>'; return html;
}

function aggregateByCategory(lists, filter){
  const grouped={};
  lists.forEach(list=>list.categories.forEach(cat=>{
    const bucket=grouped[cat.name] || (grouped[cat.name]={name:cat.name, items:{}});
    cat.items.filter(item=>!filter || filter(item)).forEach(item=>{
      const k=normalize(item.name).replace(/\W+/g,'-');
      if(!bucket.items[k]) bucket.items[k]={...item, weeks:new Set(), amounts:[], usedForParts:[], sourceItems:[]};
      bucket.items[k].weeks.add(list.weekNumber);
      if(item.amount && !bucket.items[k].amounts.includes(item.amount)) bucket.items[k].amounts.push(item.amount);
      if(item.usedFor && !bucket.items[k].usedForParts.includes(item.usedFor)) bucket.items[k].usedForParts.push(item.usedFor);
      bucket.items[k].sourceItems.push({weekNumber:list.weekNumber, category:cat.name, item});
    });
  }));
  return Object.values(grouped).map(cat=>({name:cat.name, items:Object.values(cat.items).map(it=>({
    ...it,
    weekNumber:[...it.weeks].sort().join('+'),
    amount:it.amounts.join(' + '),
    usedFor:it.usedForParts.join(' · ')
  }))})).filter(cat=>cat.items.length);
}

  const row=document.createElement('div'); row.className='shop-item';
  const key=shopKey(w,cat,item); const checked=LS.get(key)==='1';
  row.innerHTML=`<button class="checkbox ${checked?'checked':''}" aria-label="Pipa">${checked?'✓':''}</button><div><strong>${escD(item.name)}</strong><div class="small muted">${escD(item.amount)}</div><div class="tiny muted">${escD(item.usedFor)}</div></div>`;
  $('.checkbox',row).onclick=()=>{ if(LS.get(key)==='1') LS.del(key); else LS.set(key,'1'); render(); };
  return row;
}
function resetShopping(all){
  const prefix='shop-';
  if(all){ Object.keys(localStorage).forEach(k=>{ if(k.startsWith(prefix)) localStorage.removeItem(k); }); render(); return; }
  const {lists,filter}=itemsForSelection(); const cats=aggregateByCategory(lists, filter); const keys=new Set();
  cats.forEach(cat=>cat.items.forEach(item=>keys.add(shopKey(item.weekNumber, cat.name, item))));
  keys.forEach(k=>localStorage.removeItem(k)); render();
}
function renderGuide(){ const wrap=document.createElement('div'); const h=card('card'); h.innerHTML='<h2>Útmutató</h2><p class="muted">Életmód, kávé, folyadék, adagolás és fontos tudnivalók.</p>'; wrap.append(h);
  APP_DATA.adviceSections.forEach(s=>{ const d=document.createElement('details'); d.className='accordion guide-card'; d.id='guide-'+s.id; if(state.guideId===s.id) d.open=true; d.innerHTML=`<summary>${escapeHtml(s.title)}</summary><div class="acc-body guide-content markdown">${mdToHtml(s.content)}</div>`; wrap.append(d); }); return wrap; }
function renderSearch(){
  const wrap=document.createElement('div');
  const h=card('card');
  h.innerHTML='<h2>Keresés</h2><p class="muted">Keresés napokban, receptekben, hozzávalókban és útmutatókban.</p><input id="searchInput" placeholder="Pl. tökfőzelék, kefir, savanyúság..." value="'+escapeHtml(searchQ)+'">';
  wrap.append(h);
  const resultsBox=document.createElement('div');
  resultsBox.id='searchResults';
  wrap.append(resultsBox);
  function paintSearchResults(){
    resultsBox.innerHTML='';
    const q=normalize(searchQ.trim());
    const results=q?APP_DATA.searchIndex.filter(x=>x.searchText.includes(q)).slice(0,60):[];
    if(!q){ const e=card('card empty'); e.textContent='Írj be egy keresőszót.'; resultsBox.append(e); return; }
    if(!results.length){ const e=card('card empty'); e.textContent='Nincs találat.'; resultsBox.append(e); return; }
    results.forEach(r=>{ const b=document.createElement('button'); b.className='card search-result'; b.innerHTML=`<span class="chip">${escapeHtml(r.type)}</span><h3>${escD(r.title)}</h3><p class="muted">${escD(r.context||'')}</p>`; b.onclick=()=>goTarget(r.target); resultsBox.append(b); });
  }
  paintSearchResults();
  setTimeout(()=>{ const input=$('#searchInput',wrap); if(input){ input.oninput=e=>{ searchQ=e.target.value; paintSearchResults(); }; } },0);
  return wrap;
}
function goTarget(t){ if(t.view==='diet') setState({view:'diet',week:t.week,day:t.day||null}); if(t.view==='recipes') setState({view:'recipes', recipeId:t.recipeId}); if(t.view==='shopping'){shoppingMode='week'; shoppingWeek=String(t.week); shoppingDay=''; setState({view:'shopping'})} if(t.view==='guide') setState({view:'guide', guideId:t.sectionId}); }
render();
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js').catch(()=>{})); }
</script>
