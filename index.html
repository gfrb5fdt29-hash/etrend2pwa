<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Étrend">
<meta name="theme-color" content="#1D9E75">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<title>Étrend</title>
<style>
:root {
  --accent:#1D9E75; --accent-soft:#DDF5EC; --bg:#F7F8F6; --surface:#FFFFFF; --surface2:#F0F8F3;
  --text:#17201C; --muted:#66716B; --line:rgba(21,55,41,.12); --shadow:0 8px 24px rgba(26,65,49,.08);
  --cream:#FFF8EB; --nav:rgba(255,255,255,.92); --danger-soft:#FFF4DC;
}
[data-theme="dark"] {
  --bg:#07130F; --surface:#101D18; --surface2:#14261F; --text:#EEF8F3; --muted:#A9B9B1; --line:rgba(231,255,242,.12);
  --shadow:0 8px 26px rgba(0,0,0,.25); --accent-soft:#143B2E; --cream:#251F13; --nav:rgba(10,20,16,.92); --danger-soft:#2A2112;
}
[data-theme="dark"] .card.info{background:linear-gradient(135deg,#123F31 0%,#132B23 52%,var(--surface) 100%);}
[data-theme="dark"] .card.soft,[data-theme="dark"] .choice-card,[data-theme="dark"] .day-choice{background:linear-gradient(145deg,#142B23 0%,#102019 55%,var(--surface) 100%);}
*{box-sizing:border-box}
html,body{margin:0; min-height:100%; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif; -webkit-font-smoothing:antialiased;}
body{padding:env(safe-area-inset-top) 0 calc(78px + env(safe-area-inset-bottom)) 0; overflow-x:hidden;}
button,input,textarea,select{font:inherit; font-size:16px;}
button{border:0; cursor:pointer; color:inherit;}
button:disabled{opacity:.55; cursor:not-allowed; transform:none!important;}
.app{max-width:720px; margin:0 auto; min-height:100vh;}
.topbar{position:sticky; top:0; z-index:20; display:flex; justify-content:space-between; align-items:center; gap:12px; padding:14px 18px; background:linear-gradient(to bottom, var(--bg) 75%, transparent); backdrop-filter:blur(10px);}
.brand{display:flex; flex-direction:column; gap:2px}
.brand h1{margin:0; font-size:25px; letter-spacing:-.02em;}
.brand span{font-size:13px; color:var(--muted)}
.icon-btn,.soft-btn,.primary-btn{min-height:44px; border-radius:999px; padding:0 14px; display:inline-flex; align-items:center; justify-content:center; gap:7px; background:var(--surface); border:1px solid var(--line); box-shadow:var(--shadow);}
.primary-btn{background:var(--accent); color:white; border-color:transparent; font-weight:700}
.soft-btn{background:var(--surface2); box-shadow:none}
.content{padding:0 16px 18px;}
.card{background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:16px; box-shadow:var(--shadow); margin:12px 0;}
.card.soft{background:linear-gradient(135deg, var(--surface2), var(--surface));}
.card.info{background:linear-gradient(135deg, var(--accent-soft), var(--surface));}
.card.cream{background:var(--cream);}
.card h2,.card h3{margin:0 0 8px; letter-spacing:-.015em;}
.card h2{font-size:21px} .card h3{font-size:18px}
.card p{margin:8px 0; line-height:1.48}
.muted{color:var(--muted)} .small{font-size:13px} .tiny{font-size:12px}
.grid{display:grid; gap:12px} .two{grid-template-columns:repeat(2,1fr)}
.week-overview{grid-template-columns:repeat(2,minmax(0,1fr));}
.week-overview .week-card{min-height:126px; display:flex; flex-direction:column; justify-content:center;}
.week-overview .week-card h2{font-size:20px;}
.week-overview .week-card p{font-size:13px;}
@media(max-width:420px){.two:not(.week-overview){grid-template-columns:1fr} .brand h1{font-size:23px}}
.week-card,.day-card,.recipe-card,.guide-card{text-align:left; width:100%;}
.day-card .meal-line{font-size:14px; color:var(--muted); margin:4px 0; line-height:1.35}
.chips{display:flex; flex-wrap:wrap; gap:6px; margin:8px 0}
.chip{border:1px solid var(--line); background:var(--surface2); border-radius:999px; padding:5px 9px; font-size:12px; color:var(--muted); display:inline-flex; align-items:center; gap:5px}
.chip.active{background:var(--accent); color:#fff; border-color:var(--accent)}
.meal-card{border-left:4px solid var(--accent);}
.meal-card.meal-breakfast{border-left-color:#EAA23A; background:linear-gradient(135deg, rgba(255,190,93,.22) 0%, rgba(255,248,235,.72) 48%, var(--surface) 100%);}
.meal-card.meal-lunch{border-left-color:#1D9E75; background:linear-gradient(135deg, rgba(29,158,117,.18) 0%, rgba(221,245,236,.58) 48%, var(--surface) 100%);}
.meal-card.meal-dinner{border-left-color:#6A8FBF; background:linear-gradient(135deg, rgba(106,143,191,.18) 0%, rgba(238,244,252,.62) 48%, var(--surface) 100%);}
.meal-card.meal-breakfast h3{color:#A76611;}
.meal-card.meal-lunch h3{color:var(--accent);}
.meal-card.meal-dinner h3{color:#416A9F;}
[data-theme="dark"] .meal-card.meal-breakfast{background:linear-gradient(135deg, rgba(234,162,58,.20) 0%, rgba(54,39,18,.72) 48%, var(--surface) 100%); border-left-color:#F0B85A;}
[data-theme="dark"] .meal-card.meal-lunch{background:linear-gradient(135deg, rgba(29,158,117,.22) 0%, rgba(18,63,49,.68) 48%, var(--surface) 100%); border-left-color:#48C99C;}
[data-theme="dark"] .meal-card.meal-dinner{background:linear-gradient(135deg, rgba(106,143,191,.23) 0%, rgba(24,37,56,.72) 48%, var(--surface) 100%); border-left-color:#89B4EA;}
[data-theme="dark"] .meal-card.meal-breakfast h3{color:#FFD08A;}
[data-theme="dark"] .meal-card.meal-lunch h3{color:#7BE0BD;}
[data-theme="dark"] .meal-card.meal-dinner h3{color:#B8D5FF;}
.meal-top{display:flex; align-items:start; justify-content:space-between; gap:8px}
.recipe-link{margin-top:8px}
.breadcrumb{display:flex; gap:6px; flex-wrap:wrap; align-items:center; color:var(--muted); font-size:13px; margin:4px 0 8px}

.back-btn{
  min-height:42px;
  border-radius:999px;
  padding:0 15px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  font-weight:800;
  color:var(--accent);
  background:linear-gradient(135deg, rgba(29,158,117,.10), rgba(29,158,117,.03));
  border:1.5px solid rgba(29,158,117,.42);
  box-shadow:0 8px 20px rgba(29,158,117,.10);
}
.back-btn:active{
  transform:translateY(2px) scale(.955);
  box-shadow:0 3px 10px rgba(29,158,117,.12);
}
.back-btn.alt{
  color:#35614F;
  background:linear-gradient(135deg, rgba(110,143,126,.14), rgba(255,255,255,.35));
  border-color:rgba(82,116,99,.34);
}
[data-theme="dark"] .back-btn{
  color:#7BE0BD;
  background:linear-gradient(135deg, rgba(29,158,117,.20), rgba(29,158,117,.05));
  border-color:rgba(123,224,189,.42);
}
[data-theme="dark"] .back-btn.alt{
  color:#B8D7C8;
  background:linear-gradient(135deg, rgba(184,215,200,.13), rgba(255,255,255,.04));
  border-color:rgba(184,215,200,.28);
}
textarea{width:100%; min-height:90px; resize:vertical; padding:12px; border-radius:14px; border:1px solid var(--line); background:var(--surface2); color:var(--text); outline:none}
input,select{width:100%; padding:11px 12px; border-radius:13px; border:1px solid var(--line); background:var(--surface); color:var(--text); outline:none;}
.input-row{display:flex; gap:8px; align-items:center} .input-row > *{flex:1}
.water-cups{display:flex; flex-wrap:wrap; gap:7px; margin:12px 0}
.cup{width:30px; height:38px; border:2px solid var(--accent); border-top-width:3px; border-radius:4px 4px 10px 10px; opacity:.32; background:transparent; position:relative;}
.cup.filled{opacity:1; background:linear-gradient(to top, var(--accent) 72%, transparent 72%);}
.progress{height:10px; background:var(--surface2); border-radius:999px; overflow:hidden; border:1px solid var(--line)}
.progress span{display:block; height:100%; width:0; background:var(--accent); border-radius:999px}
.accordion{border:1px solid var(--line); border-radius:14px; margin:9px 0; overflow:hidden; background:var(--surface)}
.accordion summary{min-height:44px; display:flex; align-items:center; padding:0 13px; font-weight:700; cursor:pointer; list-style:none}
.accordion summary::-webkit-details-marker{display:none}
.accordion .acc-body{padding:0 13px 13px; color:var(--text); line-height:1.48}
.acc-body ul,.guide-content ul{padding-left:19px} .acc-body li,.guide-content li{margin:7px 0}
.recipe-meta{display:flex; flex-wrap:wrap; gap:8px; color:var(--muted); font-size:13px}
.filter-bar{display:grid; gap:9px; margin:12px 0}
.shopping-tabs{display:flex; gap:8px; overflow:auto; padding-bottom:4px}
.shopping-tabs button{white-space:nowrap}
.shop-item{display:flex; gap:10px; align-items:flex-start; padding:11px 0; border-bottom:1px solid var(--line)}
.shop-item:last-child{border-bottom:0}
.checkbox{width:24px; height:24px; min-width:24px; border-radius:8px; border:2px solid var(--accent); display:flex; align-items:center; justify-content:center; color:white; margin-top:1px}
.checkbox.checked{background:var(--accent)}
.guide-content{line-height:1.48} .guide-content h3{margin:16px 0 8px}
.search-result{width:100%; text-align:left}
.empty{padding:22px; text-align:center; color:var(--muted)}
.bottom-nav{position:fixed; left:0; right:0; bottom:0; z-index:50; background:var(--nav); backdrop-filter:blur(16px); border-top:1px solid var(--line); padding:8px 10px calc(8px + env(safe-area-inset-bottom)); display:flex; justify-content:center;}
.nav-inner{width:min(720px,100%); display:grid; grid-template-columns:repeat(5,1fr); gap:3px}
.nav-item{min-height:54px; border-radius:16px; background:transparent; color:var(--muted); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; font-size:11px}
.nav-item svg{width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:1.9; stroke-linecap:round; stroke-linejoin:round}
.nav-item.active{color:var(--accent); background:var(--accent-soft); font-weight:700}
.hidden{display:none!important}
.markdown strong{font-weight:800} .markdown em{font-style:italic}
.markdown hr{border:0; border-top:1px solid var(--line); margin:14px 0}
.markdown blockquote{margin:10px 0; padding:10px 12px; border-left:3px solid var(--accent); background:var(--surface2); border-radius:12px}

/* Premium, mégis puha iOS-szerű mozgások */
.view-wrap{animation:premiumPageIn 360ms cubic-bezier(.2,.9,.2,1) both; will-change:transform,opacity;}
@keyframes premiumPageIn{from{opacity:0; transform:translate3d(0,18px,0) scale(.985); filter:blur(1.5px);}60%{opacity:1;}to{opacity:1; transform:translate3d(0,0,0) scale(1); filter:blur(0);}}
button,.nav-item,.icon-btn,.soft-btn,.primary-btn,button.card,.accordion summary,.shop-item,.choice-card,.day-choice{transition:transform 210ms cubic-bezier(.2,.9,.2,1), box-shadow 230ms ease, background 230ms ease, background-color 230ms ease, border-color 230ms ease, opacity 180ms ease, filter 230ms ease; -webkit-tap-highlight-color:transparent; will-change:transform;}
button:active,.nav-item:active,.icon-btn:active,.soft-btn:active,.primary-btn:active,button.card:active,.accordion summary:active,.shop-item:active,.choice-card:active,.day-choice:active{transform:translateY(2px) scale(.955); filter:saturate(1.08);}
button.card:active,.choice-card:active,.day-choice:active,.primary-btn:active,.soft-btn:active{box-shadow:0 2px 8px rgba(17,75,53,.11), inset 0 2px 8px rgba(0,0,0,.08);}
.card,.nav-item.active,.chip.active,.primary-btn{background-image:linear-gradient(135deg, rgba(29,158,117,.03), rgba(29,158,117,0));}
.card.info{background:linear-gradient(135deg, #CFF4E6 0%, #EFFBF5 48%, var(--surface) 100%);}
.card.soft{background:linear-gradient(135deg, #E8F8F0 0%, var(--surface2) 45%, var(--surface) 100%);}
.primary-btn{background:linear-gradient(135deg, #20B985 0%, #1D9E75 52%, #137A59 100%); color:white; border-color:transparent; font-weight:800; box-shadow:0 12px 28px rgba(29,158,117,.26);}
.nav-item.active{background:linear-gradient(135deg, rgba(29,158,117,.22), rgba(29,158,117,.08));}
.accordion[open] .acc-body{animation:accordionIn 240ms cubic-bezier(.2,.9,.2,1) both;}
@keyframes accordionIn{from{opacity:0; transform:translateY(-8px);}to{opacity:1; transform:translateY(0);}}
.choice-grid{display:grid; gap:8px; grid-template-columns:repeat(3,1fr);}
.choice-grid .wide{grid-column:auto;}
.choice-card{text-align:left; width:100%; position:relative; overflow:hidden; min-height:96px; padding:12px; margin:0; background:linear-gradient(145deg, var(--surface), var(--surface2));}
.choice-card h3{margin-bottom:2px; font-size:16px;}
.choice-card .choice-icon{width:32px; height:32px; border-radius:12px; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg, var(--accent-soft), rgba(29,158,117,.08)); color:var(--accent); margin-bottom:7px; font-weight:800;}
.day-choice-grid{display:grid; gap:9px; grid-template-columns:repeat(2,minmax(0,1fr));}
.day-choice{width:100%; text-align:left; padding:13px 12px; border-radius:16px; border:1px solid var(--line); background:linear-gradient(145deg, var(--surface), var(--surface2)); box-shadow:var(--shadow); min-height:74px;}
.day-choice strong{display:block; margin-bottom:3px; font-size:14px;}
.shopping-compact{padding:12px;}
.shopping-compact h3{font-size:17px; margin-bottom:8px;}
.selection-head{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;}
.summary-note{font-size:13px; color:var(--muted); margin-top:8px;}
@media(max-width:520px){.choice-grid{grid-template-columns:repeat(3,1fr); gap:7px}.choice-card{padding:10px; min-height:88px}.choice-card p{display:none}.choice-card h3{font-size:15px}.day-choice-grid{grid-template-columns:repeat(2,minmax(0,1fr));}.day-choice .tiny{display:none;}}
.today-box{text-align:center; padding:22px 18px;}
.today-date{font-size:17px; font-weight:800; color:var(--text); margin-bottom:16px;}
.today-btn{min-width:210px; min-height:52px; font-size:16px; border-radius:18px; margin:0 auto; display:inline-flex; align-items:center; justify-content:center;}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation:none!important; transition:none!important; scroll-behavior:auto!important;}}

</style>
</head>

1 tk olíva- vagy repceolaj; egy marék vegyes zöldség kockázva (paprika, paradicsom, zöldhagyma); csipet só, bors.\n**Elkészítés lépésről lépésre:**\n1. A zöldségeket vágd apróra.\n2. Egy serpenyőben hevíts 1 tk olajat, és párold meg rajta a zöldséget 2–3 perc alatt.\n3. A tojásokat verd fel a tejjel, sózd, borsozd.\n4. Öntsd a zöldségre, és lassú-közepes lángon, folyamatosan kevergetve készítsd 2–3 perc alatt krémesre.\n5. Tálald 1 kisebb szelet kenyérrel és savanyúsággal vagy friss zöldséggel.\n**Vércukorbarát tipp:** Csak 1 tk olajjal készül, és a sok zöldség lassítja a felszívódást. Kenyér csak kis szelet legyen.\n**Emésztésbarát tipp:** A párolt zöldség kíméletesebb, mint a nyers; a paprika és paradicsom rostot és vitamint ad.\n**Maradékfelhasználási vagy előkészítési tipp:** A zöldséget előre felkockázhatod és hűtőben tárolhatod, így reggel pár perc az egész.\n**Eltarthatóság:**\n- Fagyasztható-e: Nem.\n- Hűtőben tartható-e 1–2 napig: Frissen a legjobb, de hidegen 1 napig elfogyasztható.\n- Frissen érdemes-e elkészíteni: Igen.\n- Másnapi felhasználási ötlet: Hidegen szendvicsbe téve, kenyér helyett salátalevélbe tekerve.\n\n---"}, {"id": "R03", "name": "Sós túrókrém", "category": "Reggeli / krém", "tags": ["túrós", "hideg vacsora", "vércukorbarát", "emésztésbarát", "kenyérrel fogyasztható", "1–2 napig eltartható"], "servings": "1–2 adag", "time": "kb. 8 perc", "ingredientsText": "100–120 g light vagy félzsíros túró; 2–3 ek kefir vagy natúr joghurt; néhány karika retek, uborka vagy paprika apróra vágva; 1 ek snidling; csipet só.", "ingredients": ["100–120 g light vagy félzsíros túró", "2–3 ek kefir vagy natúr joghurt", "néhány karika retek, uborka vagy paprika apróra vágva", "1 ek snidling", "csipet só."], "steps": ["A túrót egy tálban villával törd össze.", "Keverd hozzá a kefirt vagy joghurtot, amíg krémes nem lesz.", "Add hozzá az apróra vágott zöldséget és a snidlinget, sózd.", "Tálald 1 kisebb szelet kenyérrel vagy zöldségcsíkokkal."], "bloodSugarTip": "Magas fehérjetartalmú, alig van benne szénhidrát – remek párja egy kis szelet teljes kiőrlésű kenyérnek.", "digestionTip": "A kefir és a túró probiotikumokat és fehérjét ad, ami segíti az emésztést.", "prepOrLeftoverTip": "Dupla adag is készülhet; lezárva másnap reggelire vagy vacsorára is jó.", "storage": {"freezable": "Nem.", "fridge": "Igen, lefedve.", "freshRecommended": "1–2 napon belül a legjobb.", "nextDayIdea": "Hideg vacsoraként, ecetes paprikával vagy kovászos uborkával.", "raw": "- Fagyasztható-e: Nem.\n- Hűtőben tartható-e 1–2 napig: Igen, lefedve.\n- Frissen érdemes-e elkészíteni: 1–2 napon belül a legjobb.\n- Másnapi felhasználási ötlet: Hideg vacsoraként, ecetes paprikával vagy kovászos uborkával.\n\n---"}, "rawText": "**Recept ID:** R03\n**Recept neve:** Sós túrókrém\n**Kategória:** Reggeli / krém\n**Címkék:** túrós, hideg vacsora, vércukorbarát, emésztésbarát, kenyérrel fogyasztható, 1–2 napig eltartható\n**Hány adagra készül:** 1–2 adag\n**Elkészítési idő:** kb. 8 perc\n**Hozzávalók:** 100–120 g light vagy félzsíros túró; 2–3 ek kefir vagy natúr joghurt; néhány karika retek, uborka vagy paprika apróra vágva; 1 ek snidling; csipet só.\n**Elkészítés lépésről lépésre:**\n1. A túrót egy tálban villával törd össze.\n2. Keverd hozzá a kefirt vagy joghurtot, amíg krémes nem lesz.\n3. Add hozzá az apróra vágott zöldséget és a snidlinget, sózd.\n4. Tálald 1 kisebb szelet kenyérrel vagy zöldségcsíkokkal.\n**Vércukorbarát tipp:** Magas fehérjetartalmú, alig van benne szénhidrát – remek párja egy kis szelet teljes kiőrlésű kenyérnek.\n**Emésztésbarát tipp:** A kefir és a túró probiotikumokat és fehérjét ad, ami segíti az emésztést.\n**Maradékfelhasználási vagy előkészítési tipp:** Dupla adag is készülhet; lezárva másnap reggelire vagy vacsorára is jó.\n**Eltarthatóság:**\n- Fagyasztható-e: Nem.\n- Hűtőben tartható-e 1–2 napig: Igen, lefedve.\n- Frissen érdemes-e elkészíteni: 1–2 napon belül a legjobb.\n- Másnapi felhasználási ötlet: Hideg vacsoraként, ecetes paprikával vagy kovászos uborkával.\n\n---"}, {"id": "R04", "name": "Kefires-zöldfűszeres krém", "category": "Reggeli / krém", "tags": ["kefires", "túrós", "emésztésbarát", "vércukorbarát", "kenyérrel fogyasztható", "frissen ajánlott"], "servings": "1–2 adag", "time": "kb. 8 perc", "ingredientsText": "4–5 ek kefir; 2–3 ek light túró vagy natúr krémsajt; 1 kis gerezd fokhagyma (elhagyható); egy csokor friss zöldfűszer apróra (kapor, petrezselyem, snidling); csipet só, bors; mellé uborka- vagy paprikacsíkok.", "ingredients": ["4–5 ek kefir", "2–3 ek light túró vagy natúr krémsajt", "1 kis gerezd fokhagyma (elhagyható)", "egy csokor friss zöldfűszer apróra (kapor, petrezselyem, snidling)", "csipet só, bors", "mellé uborka- vagy paprikacsíkok."], "steps": ["A kefirt és a túrót (vagy krémsajtot) keverd simára.", "Reszeld vagy nyomd bele a fokhagymát, ha használsz.", "Keverd bele az apróra vágott zöldfűszereket, sózd, borsozd.", "Tálald friss zöldségcsíkokkal vagy 1 kis szelet kenyérrel."], "bloodSugarTip": "Könnyű, fehérjés krém; ha kenyérrel eszed, abból legyen kevés és inkább rozsos.", "digestionTip": "A kefir savanyított tejtermék, kifejezetten jót tesz a bélrendszernek és a székrekedésnek.", "prepOrLeftoverTip": "A zöldfűszereket előre felapríthatod; a krém pár perc alatt kész.", "storage": {"freezable": "Nem.", "fridge": "Igen, de a friss fűszer miatt 1 nap a legjobb.", "freshRecommended": "Igen.", "nextDayIdea": "Mártogatósként nyers zöldségekhez délutáni vészmegoldásként.", "raw": "- Fagyasztható-e: Nem.\n- Hűtőben tartható-e 1–2 napig: Igen, de a friss fűszer miatt 1 nap a legjobb.\n- Frissen érdemes-e elkészíteni: Igen.\n- Másnapi felhasználási ötlet: Mártogatósként nyers zöldségekhez délutáni vészmegoldásként.\n\n---"}, "rawText": "**Recept ID:** R04\n**Recept neve:** Kefires-zöldfűszeres krém\n**Kategória:** Reggeli / krém\n**Címkék:** kefires, túrós, emésztésbarát, vércukorbarát, kenyérrel fogyasztható, frissen ajánlott\n**Hány adagra készül:** 1–2 adag\n**Elkészítési idő:** kb. 8 perc\n**Hozzávalók:** 4–5 ek kefir; 2–3 ek light túró vagy natúr krémsajt; 1 kis gerezd fokhagyma (elhagyható); egy csokor friss zöldfűszer apróra (kapor, petrezselyem, snidling); csipet só, bors; mellé uborka- vagy paprikacsíkok.\n**Elkészítés lépésről lépésre:**\n1. A kefirt és a túrót (vagy krémsajtot) keverd simára.\n2. Reszeld vagy nyomd bele a fokhagymát, ha használsz.\n3. Keverd bele az apróra vágott zöldfűszereket, sózd, borsozd.\n4. Tálald friss zöldségcsíkokkal vagy 1 kis szelet kenyérrel.\n**Vércukorbarát tipp:** Könnyű, fehérjés krém; ha kenyérrel eszed, abból legyen kevés és inkább rozsos.\n**Emésztésbarát tipp:** A kefir savanyított tejtermék, kifejezetten jót tesz a bélrendszernek és a székrekedésnek.\n**Maradékfelhasználási vagy előkészítési tipp:** A zöldfűszereket előre felapríthatod; a krém pár perc alatt kész.\n**Eltarthatóság:**\n- Fagyasztható-e: Nem.\n- Hűtőben tartható-e 1–2 napig: Igen, de a friss fűszer miatt 1 nap a legjobb.\n- Frissen érdemes-e elkészíteni: Igen.\n- Másnapi felhasználási ötlet: Mártogatósként nyers zöldségekhez délutáni vészmegoldásként.\n\n---"}, {"id": "R05", "name": "Sajtos-zöldséges teljes kiőrlésű szendvics", "category": "Reggeli", "tags": ["gyors reggeli", "vércukorbarát", "kenyérrel fogyasztható", "frissen ajánlott", "savanyúsággal ajánlott"], "servings": "1 adag", "time": "kb. 5 perc", "ingredientsText": "1 szelet teljes kiőrlésű vagy rozskenyér; 1–2 vékony szelet sajt (pl. trappista, light sajt); saláta, paradicsom, uborka, paprika; kevés mustár vagy túrókrém.", "ingredients": ["1 szelet teljes kiőrlésű vagy rozskenyér", "1–2 vékony szelet sajt (pl. trappista, light sajt)", "saláta, paradicsom, uborka, paprika", "kevés mustár vagy túrókrém."], "steps": ["A kenyeret vékonyan kend meg mustárral vagy túrókrémmel.", "Tegyél rá salátalevelet, sajtot és a felkarikázott zöldségeket.", "Tálald azonnal, mellé akár egy kis savanyúsággal."], "bloodSugarTip": "A sajt fehérjéje és a sok zöldség mellé 1 szelet teljes kiőrlésű kenyér lassabban szívódik fel, mint a fehér.", "digestionTip": "A friss zöldségek rostot adnak; ha érzékenyebb a gyomrod, a paprikát hámozd meg.", "prepOrLeftoverTip": "A zöldségeket este felszeletelheted; reggel csak összeállítod.", "storage": {"freezable": "Nem.", "fridge": "Frissen ajánlott; összeállítva nem áll el jól.", "freshRecommended": "Igen.", "nextDayIdea": "A sajt és zöldség külön eltéve másnap is felhasználható.", "raw": "- Fagyasztható-e: Nem.\n- Hűtőben tartható-e 1–2 napig: Frissen ajánlott; összeállítva nem áll el jól.\n- Frissen érdemes-e elkészíteni: Igen.\n- Másnapi felhasználási ötlet: A sajt és zöldség külön eltéve másnap is felhasználható.\n\n---"}, "rawText": "**Recept ID:** R05\n**Recept neve:** Sajtos-zöldséges teljes kiőrlésű szendvics\n**Kategória:** Reggeli\n**Címkék:** gyors reggeli, vércukorbarát, kenyérrel fogyasztható, frissen ajánlott, savanyúsággal ajánlott\n**Hány adagra készül:** 1 adag\n**Elkészítési idő:** kb. 5 perc\n**Hozzávalók:** 1 szelet teljes kiőrlésű vagy rozskenyér; 1–2 vékony szelet sajt (pl. trappista, light sajt); saláta, paradicsom, uborka, paprika; kevés mustár vagy túrókrém.\n**Elkészítés lépésről lépésre:**\n1. A kenyeret vékonyan kend meg mustárral vagy túrókrémmel.\n2. Tegyél rá salátalevelet, sajtot és a felkarikázott zöldségeket.\n3. Tálald azonnal, mellé akár egy kis savanyúsággal.\n**Vércukorbarát tipp:** A sajt fehérjéje és a sok zöldség mellé 1 szelet teljes kiőrlésű kenyér lassabban szívódik fel, mint a fehér.\n**Emésztésbarát tipp:** A friss zöldségek rostot adnak; ha érzékenyebb a gyomrod, a paprikát hámozd meg.\n**Maradékfelhasználási vagy előkészítési tipp:** A zöldségeket este felszeletelheted; reggel csak összeállítod.\n**Eltarthatóság:**\n- Fagyasztható-e: Nem.\n- Hűtőben tartható-e 1–2 napig: Frissen ajánlott; összeállítva nem áll el jól.\n- Frissen érdemes-e elkészíteni: Igen.\n- Másnapi felhasználási ötlet: A sajt és zöldség külön eltéve másnap is felhasználható.\n\n---"}, { aprika vagy paradicsom; 1 kisebb szelet kenyér.\n**Elkészítés lépésről lépésre:**\n1. A tojásokat hideg vízben tedd fel, és forrástól számítva főzd 8–10 percig keményre (ha lágyabban szereted, 6 perc).\n2. Hideg vízbe téve hűtsd, majd pucold meg és vágd félbe.\n3. Tálald savanyúsággal, friss zöldséggel és 1 kisebb szelet kenyérrel.\n**Vércukorbarát tipp:** Tiszta fehérje a tojásból, gyakorlatilag cukor nélkül; remek, laktató, egyszerű reggeli.\n**Emésztésbarát tipp:** A savanyú káposzta és a kovászos uborka természetes savanyított ételek, jót tesznek a bélflórának.\n**Maradékfelhasználási vagy előkészítési tipp:** Főzz egyszerre 4 tojást – a maradék hidegen másnap reggelire vagy délutáni vészmegoldásnak is jó.\n**Eltarthatóság:**\n- Fagyasztható-e: Nem.\n- Hűtőben tartható-e 1–2 napig: A héjában hagyott főtt tojás 1–2 napig eláll.\n- Frissen érdemes-e elkészíteni: A főzés gyors, de előre is elkészíthető.\n- Másnapi felhasználási ötlet: Felkarikázva salátára vagy szendvicsbe.\n\n---"}, {"id": "R07", "name": "Túrós-zabos reggeli", "category": "Reggeli", "tags": ["túrós", "joghurtos", "rostban gazdag", "emésztésbarát", "vércukorbarát", "1–2 napig eltartható"], "servings": "1 adag", "time": "kb. 5 perc (+ pihentetés)", "ingredientsText": "3 ek zabpehely; 1 kis pohár kefir vagy natúr joghurt (kb. 1,5 dl); 2–3 ek light túró; 1 tk őrölt lenmag; fél alma reszelve vagy egy marék bogyós gyümölcs; csipet fahéj.", "ingredients": ["3 ek zabpehely", "1 kis pohár kefir vagy natúr joghurt (kb. 1,5 dl)", "2–3 ek light túró", "1 tk őrölt lenmag", "fél alma reszelve vagy egy marék bogyós gyümölcs", "csipet fahéj."], "steps": ["Egy tálban keverd össze a zabpelyhet, a kefirt (vagy joghurtot) és a túrót.", "Add hozzá az őrölt lenmagot és a fahéjat.", "Keverd bele a reszelt almát vagy a bogyós gyümölcsöt.", "Hagyd állni 10 percet (vagy előző este tedd hűtőbe), hogy a zab megszívja magát, és kész."], "bloodSugarTip": "Ez az egyetlen kicsit „édesebb\" reggeli – a sok fehérje (túró, kefir) és rost (zab, lenmag) miatt mégis vércukorbarát. Hozzáadott cukor nélkül, a gyümölcs adja az édességet.", "digestionTip": "A zab, a lenmag és a kefir együtt kifejezetten segíti a bélműködést és a székrekedés oldását – igyál mellé egy pohár vizet.", "prepOrLeftoverTip": "Klasszikus „overnight\" reggeli: előző este összeállítva reggelre tökéletes, vihető is.", "storage": {"freezable": "Nem.", "fridge": "Igen, lefedve 1–2 napig.", "freshRecommended": "Előző esti előkészítés ajánlott.", "nextDayIdea": "Kis dobozban munkába/útra vihető délelőtti reggeliként.", "raw": "- Fagyasztható-e: Nem.\n- Hűtőben tartható-e 1–2 napig: Igen, lefedve 1–2 napig.\n- Frissen érdemes-e elkészíteni: Előző esti előkészítés ajánlott.\n- Másnapi felhasználási ötlet: Kis dobozban munkába/útra vihető délelőtti reggeliként.\n\n### Levesek\n\n---"}, "rawText": "**Recept ID:** R07\n**Recept neve:** Túrós-zabos reggeli\n**Kategória:** Reggeli\n**Címkék:** túrós, joghurtos, rostban gazdag, emésztésbarát, vércukorbarát, 1–2 napig eltartható\n**Hány adagra készül:** 1 adag\n**Elkészítési idő:** kb. 5 perc (+ pihentetés)\n**Hozzávalók:** 3 ek zabpehely; 1 kis pohár kefir vagy natúr joghurt (kb. 1,5 dl); 2–3 ek light túró; 1 tk őrölt lenmag; fél alma reszelve vagy egy marék bogyós gyümölcs; csipet fahéj.\n**Elkészítés lépésről lépésre:**\n1. Egy tálban keverd össze a zabpelyhet, a kefirt (vagy joghurtot) és a túrót.\n2. Add hozzá az őrölt lenmagot és a fahéjat.\n3. Keverd bele a reszelt almát vagy a bogyós gyümölcsöt.\n4. Hagyd állni 10 percet (vagy előző este tedd hűtőbe), hogy a zab megszívja magát, és kész.\n**Vércukorbarát tipp:** Ez az egyetlen kicsit „édesebb\" reggeli – a sok fehérje (túró, kefir) és rost (zab, lenmag) miatt mégis vércukorbarát. Hozzáadott cukor nélkül, a gyümölcs adja az édességet.\n**Emésztésbarát tipp:** A zab, a lenmag és a kefir együtt kifejezetten segíti a bélműködést és a székrekedés oldását – igyál mellé egy pohár vizet.\n**Maradékfelhasználási vagy előkészítési tipp:** Klasszikus „overnight\" reggeli: előző este összeállítva reggelre tökéletes, vihető is.\n**Eltarthatóság:**\n- Fagyasztható-e: Nem.\n- Hűtőben tartható-e 1–2 napig: Igen, lefedve 1–2 napig.\n- Frissen érdemes-e elkészíteni: Előző esti előkészítés ajánlott.\n- Másnapi felhasználási ötlet: Kis dobozban munkába/útra vihető délelőtti reggeliként.\n\n### Levesek\n\n---"}, {"id": "R08", "name": "Zöldségleves csirkével", "category": "Leves", "tags": ["leves", "magyaros", "vércukorbarát", "emésztésbarát", "fagyasztható", "1–2 napig eltartható", "maradékfelhasználásra jó"], "servings": "2–3 adag (tudatosan 2–3 napra)", "time": "kb. 55 perc", "ingredientsText": "2 db csirkefelsőcomb (bőr nélkül) vagy kb. 25–30 dkg csirkemell kockázva; 2 sárgarépa; 1 petrezselyemgyökér; egy kisebb darab zeller; fél karalábé; 1 fej vöröshagyma; egy marék zöldborsó vagy zöldbab; 1 babérlevél; só, bors; friss petrezselyemzöld.", "ingredients": ["2 db csirkefelsőcomb (bőr nélkül) vagy kb. 25–30 dkg csirkemell kockázva", "2 sárgarépa", "1 petrezselyemgyökér", "egy kisebb darab zeller", "fél karalábé", "1 fej vöröshagyma", "egy marék zöldborsó vagy zöldbab", "1 babérlevél", "só, bors", "friss petrezselyemzöld."], "steps": ["A csirkét tedd fel kb. 1,5–2 liter hideg vízbe, és lassan forrald fel.", "Forrás után szedd le a habját, sózd, dobd bele a babérlevelet.", "Közben a zöldségeket pucold meg és karikázd/kockázd fel.", "Tedd a zöldségeket a leveshez, és gyöngyöző forralással főzd 40–45 perc alatt puhára.", "A végén borsozd, szórd meg petrezselyemmel. Ha szeretnél, a csirkehúst kivéve felkockázhatod és visszateheted."], "bloodSugarTip": "Tartalmas, mégis könnyű fogás; kenyér helyett a sok zöldség és a hús tölt meg. Ha kenyeret eszel hozzá, abból csak 1 kis szelet legyen.", "digestionTip": "A meleg, főtt zöldséges leves nagyon kíméletes a gyomornak, és bőséges folyadékot ad – ez segíti a székrekedés oldását is.", "prepOrLeftoverTip": "Szándékosan 2–3 napra főzd. A leszűrt húslevet és a húst külön is használhatod: a csirkehús másnap salátába vagy szendvicsbe is jó.", "storage": {"freezable": "Igen, kiválóan (tészta nélkül fagyaszd).", "fridge": "Igen, 2–3 napig is.", "freshRecommended": "Frissen finom, de maradékként is remek.", "nextDayIdea": "A főtt zöldség egy részét kivéve, kevés levessel összeturmixolva krémleves lesz belőle.", "raw": "- Fagyasztható-e: Igen, kiválóan (tészta nélkül fagyaszd).\n- Hűtőben tartható-e 1–2 napig: Igen, 2–3 napig is.\n- Frissen érdemes-e elkészíteni: Frissen finom, de maradékként is remek.\n- Másnapi felhasználási ötlet: A főtt zöldség egy részét kivéve, kevés levessel összeturmixolva krémleves lesz belőle.\n\n---"}, "rawText": "**Recept ID:** R08\n**Recept neve:** Zöldségleves csirkével\n**Kategória:** Leves\n**Címkék:** leves, magyaros, vércukorbarát, emésztésbarát, fagyasztható, 1–2 napig eltartható, maradékfelhasználásra jó\n**Hány adagra készül:** 2–3 adag (tudatosan 2–3 napra)\n**Elkészítési idő:** kb. 55 perc\n**Hozzávalók:** 2 db csirkefelsőcomb (bőr nélkül) vagy kb. 25–30 dkg csirkemell kockázva; 2 sárgarépa; 1 petrezselyemgyökér; egy kisebb darab zeller; fél karalábé; 1 fej vöröshagyma; egy marék zöldborsó vagy zöldbab; 1 babérlevél; só, bors; friss petrezselyemzöld.\n**Elkészítés lépésről lépésre:**\n1. A csirkét tedd fel kb. 1,5–2 liter hideg vízbe, és lassan forrald fel.\n2. Forrás után szedd le a habját, sózd, dobd bele a babérlevelet.\n3. Közben a zöldségeket pucold meg és karikázd/kockázd fel.\n4. Tedd a zöldségeket a leveshez, és gyöngyöző forralással főzd 40–45 perc alatt puhára.\n5. A végén borsozd, szórd meg petrezselyemmel. Ha szeretnél, a csirkehúst kivéve felkockázhatod és visszateheted.\n**Vércukorbarát tipp:** Tartalmas, mégis könnyű fogás; kenyér helyett a sok zöldség és a hús tölt meg. Ha kenyeret eszel hozzá, abból csak 1 kis szelet legyen.\n**Emésztésbarát tipp:** A meleg, főtt zöldséges leves nagyon kíméletes a gyomornak, és bőséges folyadékot ad – ez segíti a székrekedés oldását is.\n**Maradékfelhasználási vagy előkészítési tipp:** Szándékosan 2–3 napra főzd. A leszűrt húslevet és a húst külön is használhatod: a csirkehús másnap salátába vagy szendvicsbe is jó.\n**Eltarthatóság:**\n- Fagyasztható-e: Igen, kiválóan (tészta nélkül fagyaszd).\n- Hűtőben tartható-e 1–2 napig: Igen, 2–3 napig is.\n- Frissen érdemes-e elkészíteni: Frissen finom, de maradékként is remek.\n- Másnapi felhasználási ötlet: A főtt zöldség egy részét kivéve, kevés levessel összeturmixolva krémleves lesz belőle.\n\n---"}, {"id": "R09", "name": "Lencseleves könnyítve", "category": "Leves", "tags": ["leves", "magyaros", "rostban gazdag", "emésztésbarát", "vércukorbarát", "fagyasztható", "maradékfelhasználásra jó"], "servings": "2 adag", "time": "kb. 40 perc", "ingredientsText": "1,5 dl barna vagy zöld lencse; 1 sárgarépa; fél fej vöröshagyma; 1 gerezd fokhagyma; 1 babérlevél; fél tk pirospaprika; 1 tk olaj; kevés ecet vagy citromlé; só, bors; sűrítéshez 1 ek zabpehelyliszt (vagy a leves egy részének pürésítése).", "ingredients": ["1,5 dl barna vagy zöld lencse", "1 sárgarépa", "fél fej vöröshagyma", "1 gerezd fokhagyma", "1 babérlevél", "fél tk pirospaprika", "1 tk olaj", "kevés ecet vagy citromlé", "só, bors", "sűrítéshez 1 ek zabpehelyliszt (vagy a leves egy részének pürésítése)."], "steps": ["A lencsét öblítsd át (barna/zöld lencsét nem kötelező áztatni).", "Egy lábasban 1 tk olajon futtasd meg az apróra vágott hagymát, add hozzá a reszelt fokhagymát és a pirospaprikát, gyorsan keverd el (ne égjen meg).", "Öntsd fel kb. 7–8 dl vízzel, add hozzá a lencsét, a karikázott répát és a babérlevelet.", "Főzd 25–30 perc alatt puhára.", "Sűrítés rántás nélkül: vagy meríts ki egy keveset és turmixold simára, majd öntsd vissza; vagy keverj el 1 ek zabpehellisztet kevés hideg vízzel, és azzal sűrítsd. Forrald össze 2–3 percig.", "A végén ízesítsd kevés ecettel vagy citromlével, sózd, borsozd."], "bloodSugarTip": "A lencse lassan felszívódó szénhidrát és növényi fehérje egyben – jól tartja a vércukrot. Kenyeret csak keveset egyél mellé.", "digestionTip": "Nagyon rostgazdag, ezért eleinte kisebb adaggal kezdd, és igyál mellé bőven vizet. Ha érzékenyebb vagy rá, a hagymát finomra vágd, és jól főzd puhára.", "prepOrLeftoverTip": "A felét nyugodtan fagyaszd le egy másik hétre, így nem lesz belőle túl sok egyszerre.", "storage": {"freezable": "Igen.", "fridge": "Igen, 2 napig.", "freshRecommended": "Frissen és maradékként is jó (másnap kicsit sűrűbb lesz, hígítsd vízzel).", "nextDayIdea": "Sűrűbbre hagyva főzelékszerű körete lehet egy kis sült húsnak.", "raw": "- Fagyasztható-e: Igen.\n- Hűtőben tartható-e 1–2 napig: Igen, 2 napig.\n- Frissen érdemes-e elkészíteni: Frissen és maradékként is jó (másnap kicsit sűrűbb lesz, hígítsd vízzel).\n- Másnapi felhasználási ötlet: Sűrűbbre hagyva főzelékszerű körete lehet egy kis sült húsnak.\n\n---"}, "rawText": "**Recept ID:** R09\n**Recept neve:** Lencseleves könnyítve\n**Kategória:** Leves\n**Címkék:** leves, magyaros, rostban gazdag, emésztésbarát, vércukorbarát, fagyasztható, maradékfelhasználásra jó\n**Hány adagra készül:** 2 adag\n**Elkészítési idő:** kb. 40 perc\n**Hozzávalók:** 1,5 dl barna vagy zöld lencse; 1 sárgarépa; fél fej vöröshagyma; 1 gerezd fokhagyma; 1 babérlevél; fél tk pirospaprika; 1 tk olaj; kevés ecet vagy citromlé; só, bors; sűrítéshez 1 ek zabpehelyliszt (vagy a leves egy részének pürésítése).\n**Elkészítés lépésről lépésre:**\n1. A lencsét öblítsd át (barna/zöld lencsét nem kötelező áztatni).\n2. Egy lábasban 1 tk olajon futtasd meg az apróra vágott hagymát, add hozzá a reszelt fokhagymát és a pirospaprikát, gyorsan keverd el (ne égjen meg).\n3. Öntsd fel kb. 7–8 dl vízzel, add hozzá a lencsét, a karikázott répát és a babérlevelet.\n4. Főzd 25–30 perc alatt puhára.\n5. Sűrítés rántás nélkül: vagy meríts ki egy keveset és turmixold simára, majd öntsd vissza; vagy keverj el 1 ek zabpehellisztet kevés hideg vízzel, és azzal sűrítsd. Forrald össze 2–3 percig.\n6. A végén ízesítsd kevés ecettel vagy citromlével, sózd, borsozd.\n**Vércukorbarát tipp:** A lencse lassan felszívódó szénhidrát és növényi fehérje egyben – jól tartja a vércukrot. Kenyeret csak keveset egyél mellé.\n**Emésztésbarát tipp:** Nagyon rostgazdag, ezért eleinte kisebb adaggal kezdd, és igyál mellé bőven vizet. Ha érzékenyebb vagy rá, a hagymát finomra vágd, és jól főzd puhára.\n**Maradékfelhasználási vagy előkészítési tipp:** A felét nyugodtan fagyaszd le egy másik hétre, így nem lesz belőle túl sok egyszerre.\n**Eltarthatóság:**\n- Fagyasztható-e: Igen.\n- Hűtőben tartható-e 1–2 napig: Igen, 2 napig.\n- Frissen érdemes-e elkészíteni: Frissen és maradékként is jó (másnap kicsit sűrűbb lesz, hígítsd vízzel).\n- Másnapi felhasználási ötlet: Sűrűbbre hagyva főzelékszerű körete lehet egy kis sült húsnak.\n\n---"}, {"id": "R10", "name": "Karfiolkrémleves", "category": "Leves", "tags": ["leves", "krémleves", "vércukorbarát", "emésztésbarát", "kevés olajjal", "fagyasztható", "1–2 napig eltartható"], "servings": "2 adag", "time": "kb. 30 perc", "ingredientsText": "1 kisebb fej karfiol rózsáira szedve; 1 kisebb burgonya (a krémes állaghoz); 1 sárgarépa; fél fej vöröshagyma; 1 tk olaj; csipet szerecsendió; só, bors; a végére 2–3 ek natúr joghurt vagy egy kevés tej.", "ingredients": ["1 kisebb fej karfiol rózsáira szedve", "1 kisebb burgonya (a krémes állaghoz)", "1 sárgarépa", "fél fej vöröshagyma", "1 tk olaj", "csipet szerecsendió", "só, bors", "a végére 2–3 ek natúr joghurt vagy egy kevés tej."], "steps": ["Egy lábasban 1 tk olajon futtasd meg az apróra vágott hagymát 1–2 percig.", "Add hozzá a felkockázott burgonyát, répát és a karfiolrózsákat, keverd át.", "Önts rá annyi vizet, hogy ellepje, sózd, és főzd 18–20 perc alatt puhára.", "Botmixerrel turmixold teljesen simára – ez adja a krémes állagot, rántás nélkül.", "Vedd le a tűzről, keverd bele a joghurtot vagy tejet (forrald már ne, hogy ne csapódjon ki), fűszerezd szerecsendióval, borssal."], "bloodSugarTip": "A sűrítés zöldségből (burgonya, karfiol) és turmixolásból jön, nem lisztes rántásból – így könnyebb és vércukorbarátabb.", "digestionTip": "A turmixolt, meleg krémleves nagyon könnyű a gyomornak; a karfiolt jól főzd puhára, hogy ne puffasszon.", "prepOrLeftoverTip": "A joghurtot mindig csak a tálaláshoz keverd hozzá; a leves alaplé formájában jól eláll.", "storage": {"freezable": "Igen, a joghurt hozzáadása nélkül fagyaszd.", "fridge": "Igen.", "freshRecommended": "Frissen krémes a legjobb, de maradékként is finom.", "nextDayIdea": "Pirított teljes kiőrlésű kenyérkockával (kevés) vagy egy kanál túróval gazdagítva.", "raw": "- Fagyasztható-e: Igen, a joghurt hozzáadása nélkül fagyaszd.\n- Hűtőben tartható-e 1–2 napig: Igen.\n- Frissen érdemes-e elkészíteni: Frissen krémes a legjobb, de maradékként is finom.\n- Másnapi felhasználási ötlet: Pirított teljes kiőrlésű kenyérkockával (kevés) vagy egy kanál túróval gazdagítva.\n\n---"}, "rawText": "**Recept ID:** R10\n**Recept neve:** Karfiolkrémleves\n**Kategória:** Leves\n**Címkék:** leves, krémleves, vércukorbarát, emésztésbarát, kevés olajjal, fagyasztható, 1–2 napig eltartható\n**Hány adagra készül:** 2 adag\n**Elkészítési idő:** kb. 30 perc\n**Hozzávalók:** 1 kisebb fej karfiol rózsáira szedve; 1 kisebb burgonya (a krémes állaghoz); 1 sárgarépa; fél fej vöröshagyma; 1 tk olaj; csipet szerecsendió; só, bors; a végére 2–3 ek natúr joghurt vagy egy kevés tej.\n**Elkészítés lépésről lépésre:**\n1. Egy lábasban 1 tk olajon futtasd meg az apróra vágott hagymát 1–2 percig.\n2. Add hozzá a felkockázott burgonyát, répát és a karfiolrózsákat, keverd át.\n3. Önts rá annyi vizet, hogy ellepje, sózd, és főzd 18–20 perc alatt puhára.\n4. Botmixerrel turmixold teljesen simára – ez adja a krémes állagot, rántás nélkül.\n5. Vedd le a tűzről, keverd bele a joghurtot vagy tejet (forrald már ne, hogy ne csapódjon ki), fűszerezd szerecsendióval, borssal.\n**Vércukorbarát tipp:** A sűrítés zöldségből (burgonya, karfiol) és turmixolásból jön, nem lisztes rántásból – így könnyebb és vércukorbarátabb.\n**Emésztésbarát tipp:** A turmixolt, meleg krémleves nagyon könnyű a gyomornak; a karfiolt jól főzd puhára, hogy ne puffasszon.\n**Maradékfelhasználási vagy előkészítési tipp:** A joghurtot mindig csak a tálaláshoz keverd hozzá; a leves alaplé formájában jól eláll.\n**Eltarthatóság:**\n- Fagyasztható-e: Igen, a joghurt hozzáadása nélkül fagyaszd.\n- Hűtőben tartható-e 1–2 napig: Igen.\n- Frissen érdemes-e elkészíteni: Frissen krémes a legjobb, de maradékként is finom.\n- Másnapi felhasználási ötlet: Pirított teljes kiőrlésű kenyérkockával (kevés) vagy egy kanál túróval gazdagítva.\n\n---"}, {"id": "R11", "name": "Zöldborsóleves", "category": "Leves", "tags": ["leves", "magyaros", "emésztésbarát", "vércukorbarát", "fagyasztható", "1–2 napig eltartható"], "servings": "2 adag", "time": "kb. 30 perc", "ingredientsText": "40–50 dkg zöldborsó (friss vagy fagyasztott); 1 sárgarépa; fél fej vöröshagyma; 1 tk olaj; friss petrezselyem; só, bors; sűrítéshez joghurtos habarás (2 ek natúr joghurt + 1 tk teljes kiőrlésű liszt).", "ingredients": ["40–50 dkg zöldborsó (friss vagy fagyasztott)", "1 sárgarépa", "fél fej vöröshagyma", "1 tk olaj", "friss petrezselyem", "só, bors", "sűrítéshez joghurtos habarás (2 ek natúr joghurt + 1 tk teljes kiőrlésű liszt)."], "steps": ["1 tk olajon futtasd meg az apróra vágott hagymát és a kockázott répát 2–3 percig.", "Add hozzá a zöldborsót, önts rá kb. 7 dl vizet, sózd.", "Főzd 15–18 perc alatt puhára.", "Habarás rántás nélkül: a joghurtot keverd simára a liszttel, lazítsd fel pár kanál meleg levessel, majd öntsd vissza a leveshez, és forrald össze 2–3 percig, közben kevergetve.", "Borsozd, szórd meg petrezselyemmel."], "bloodSugarTip": "A joghurtos habarás kevesebb zsír és liszt, mint a klasszikus rántás – könnyebb és vércukorbarátabb. Egy főtt tojással vagy kis sajttal komplett ebéd.", "digestionTip": "Könnyű, zöldséges leves; ha a borsó héja zavar, a leves felét turmixolhatod simábbra.", "prepOrLeftoverTip": "A 2. adagot fagyaszd le habarás nélkül, és frissen habard be felmelegítéskor.", "storage": {"freezable": "Igen (habarás nélkül a legjobb).", "fridge": "Igen.", "freshRecommended": "Mindkettő jó.", "nextDayIdea": "Sűrűbbre turmixolva borsópüré-köret lehet egy kis sült húshoz.", "raw": "- Fagyasztható-e: Igen (habarás nélkül a legjobb).\n- Hűtőben tartható-e 1–2 napig: Igen.\n- Frissen érdemes-e elkészíteni: Mindkettő jó.\n- Másnapi felhasználási ötlet: Sűrűbbre turmixolva borsópüré-köret lehet egy kis sült húshoz.\n\n---"}, "rawText": "**Recept ID:** R11\n**Recept neve:** Zöldborsóleves\n**Kategória:** Leves\n**Címkék:** leves, magyaros, emésztésbarát, vércukorbarát, fagyasztható, 1–2 napig eltartható\n**Hány adagra készül:** 2 adag\n**Elkészítési idő:** kb. 30 perc\n**Hozzávalók:** 40–50 dkg zöldborsó (friss vagy fagyasztott); 1 sárgarépa; fél fej vöröshagyma; 1 tk olaj; friss petrezselyem; só, bors; sűrítéshez joghurtos habarás (2 ek natúr joghurt + 1 tk teljes kiőrlésű liszt).\n**Elkészítés lépésről lépésre:**\n1. 1 tk olajon futtasd meg az apróra vágott hagymát és a kockázott répát 2–3 percig.\n2. Add hozzá a zöldborsót, önts rá kb. 7 dl vizet, sózd.\n3. Főzd 15–18 perc alatt puhára.\n4. Habarás rántás nélkül: a joghurtot keverd simára a liszttel, lazítsd fel pár kanál meleg levessel, majd öntsd vissza a leveshez, és forrald össze 2–3 percig, közben kevergetve.\n5. Borsozd, szórd meg petrezselyemmel.\n**Vércukorbarát tipp:** A joghurtos habarás kevesebb zsír és liszt, mint a klasszikus rántás – könnyebb és vércukorbarátabb. Egy főtt tojással vagy kis sajttal komplett ebéd.\n**Emésztésbarát tipp:** Könnyű, zöldséges leves; ha a borsó héja zavar, a leves felét turmixolhatod simábbra.\n**Maradékfelhasználási vagy előkészítési tipp:** A 2. adagot fagyaszd le habarás nélkül, és frissen habard be felmelegítéskor.\n**Eltarthatóság:**\n- Fagyasztható-e: Igen (habarás nélkül a legjobb).\n- Hűtőben tartható-e 1–2 napig: Igen.\n- Frissen érdemes-e elkészíteni: Mindkettő jó.\n- Másnapi felhasználási ötlet: Sűrűbbre turmixolva borsópüré-köret lehet egy kis sült húshoz.\n\n---"}, {"id": "R12", "name": "Paradicsomleves (teljes kiőrlésű tésztával)", "category": "Leves", "tags": ["leves", "magyaros", "mediterrán jellegű", "vércukorbarát", "1–2 napig eltartható", "fagyasztható"], "servings": "2 adag", "time": "kb. 30 perc", "ingredientsText": "1 doboz hámozott paradicsom (vagy 5–6 érett friss paradicsom) + 1 ek paradicsompüré; fél fej vöröshagyma; 1 gerezd fokhagyma; 1 tk olívaolaj; friss vagy szárított bazsalikom; só, bors; tálaláshoz 2–3 ek főtt teljes kiőrlésű tészta adagonként és kevés reszelt sajt.", "ingredients": ["1 doboz hámozott paradicsom (vagy 5–6 érett friss paradicsom) + 1 ek paradicsompüré", "fél fej vöröshagyma", "1 gerezd fokhagyma", "1 tk olívaolaj", "friss vagy szárított bazsalikom", "só, bors", "tálaláshoz 2–3 ek főtt teljes kiőrlésű tészta adagonként és kevés reszelt sajt."], "steps": ["1 tk olívaolajon futtasd meg az apróra vágott hagymát és fokhagymát 2 percig.", "Add hozzá a paradicsomot és a paradicsompürét, önts rá kb. 6 dl vizet.", "Sózd, és főzd 15–18 percig.", "Botmixerrel turmixold simára, ízesítsd bazsalikommal, borssal. (Cukor helyett a hosszabb főzés és a hagyma hozza az édeskés ízt.)", "Tálaláskor tegyél a tányérba 2–3 ek főtt teljes kiőrlésű tésztát, és szórd meg kevés sajttal a fehérjéért."], "bloodSugarTip": "A bolti paradicsomlevesek gyakran cukrozottak – ez nem az. A teljes kiőrlésű tésztából csak pár kanál kerül bele, így vércukorbarát marad.", "digestionTip": "A turmixolt paradicsom könnyű; ha savas a gyomrod, főzd kicsit tovább, és tegyél bele egy kis reszelt répát a lágyabb ízért.", "prepOrLeftoverTip": "A levest tészta nélkül főzd és tárold; a tésztát mindig frissen, a tányérba add, hogy ne ázzon szét.", "storage": {"freezable": "Igen (tészta nélkül).", "fridge": "Igen.", "freshRecommended": "Mindkettő jó.", "nextDayIdea": "Sűrű paradicsomszószként sült csirkemellhez vagy rakott zöldséghez.", "raw": "- Fagyasztható-e: Igen (tészta nélkül).\n- Hűtőben tartható-e 1–2 napig: Igen.\n- Frissen érdemes-e elkészíteni: Mindkettő jó.\n- Másnapi felhasználási ötlet: Sűrű paradicsomszószként sült csirkemellhez vagy rakott zöldséghez.\n\n### Főzelékek\n\n---"}, "rawText": "**Recept ID:** R12\n**Recept neve:** Paradicsomleves (teljes kiőrlésű tésztával)\n**Kategória:** Leves\n**Címkék:** leves, magyaros, mediterrán jellegű, vércukorbarát, 1–2 napig eltartható, fagyasztható\n**Hány adagra készül:** 2 adag\n**Elkészítési idő:** kb. 30 perc\n**Hozzávalók:** 1 doboz hámozott paradicsom (vagy 5–6 érett friss paradicsom) + 1 ek paradicsompüré; fél fej vöröshagyma; 1 gerezd fokhagyma; 1 tk olívaolaj; friss vagy szárított bazsalikom; só, bors; tálaláshoz 2–3 ek főtt teljes kiőrlésű tészta adagonként és kevés reszelt sajt.\n**Elkészítés lépésről lépésre:**\n1. 1 tk olívaolajon futtasd meg az apróra vágott hagymát és fokhagymát 2 percig.\n2. Add hozzá a paradicsomot és a paradicsompürét, önts rá kb. 6 dl vizet.\n3. Sózd, és főzd 15–18 percig.\n4. Botmixerrel turmixold simára, ízesítsd bazsalikommal, borssal. (Cukor helyett a hosszabb főzés és a hagyma hozza az édeskés ízt.)\n5. Tálaláskor tegyél a tányérba 2–3 ek főtt teljes kiőrlésű tésztát, és szórd meg kevés sajttal a fehérjéért.\n**Vércukorbarát tipp:** A bolti paradicsomlevesek gyakran cukrozottak – ez nem az. A teljes kiőrlésű tésztából csak pár kanál kerül bele, így vércukorbarát marad.\n**Emésztésbarát tipp:** A turmixolt paradicsom könnyű; ha savas a gyomrod, főzd kicsit tovább, és tegyél bele egy kis reszelt répát a lágyabb ízért.\n**Maradékfelhasználási vagy előkészítési tipp:** A levest tészta nélkül főzd és tárold; a tésztát mindig frissen, a tányérba add, hogy ne ázzon szét.\n**Eltarthatóság:**\n- Fagyasztható-e: Igen (tészta nélkül).\n- Hűtőben tartható-e 1–2 napig: Igen.\n- Frissen érdemes-e elkészíteni: Mindkettő jó.\n- Másnapi felhasználási ötlet: Sűrű paradicsomszószként sült csirkemellhez vagy rakott zöldséghez.\n\n### Főzelékek\n\n---"}, {"id": "R13", "name": "Tökfőzelék egészségesebben", "category": "Főzelék", "tags": ["főzelék", "magyaros", "vércukorbarát", "emésztésbarát", "kevés olajjal", "maradékfelhasználásra jó", "1–2 napig eltartható"], "servings": "2–3 adag (tudatosan 2–3 napra)", "time": "kb. 35 perc", "ingredientsText": "kb. 80 dkg gyalult főzőtök; fél fej vöröshagyma; 1 tk olaj; egy csokor friss vagy szárított kapor; csipet pirospaprika; kevés ecet; só, bors; habaráshoz 3 ek natúr joghurt vagy kefir + 1 ek teljes kiőrlésű liszt.", "ingredients": ["kb. 80 dkg gyalult főzőtök", "fél fej vöröshagyma", "1 tk olaj", "egy csokor friss vagy szárított kapor", "csipet pirospaprika", "kevés ecet", "só, bors", "habaráshoz 3 ek natúr joghurt vagy kefir + 1 ek teljes kiőrlésű liszt."], "steps": ["A gyalult tököt sózd meg, és hagyd állni 10 percet, majd nyomkodd ki a levét.", "1 tk olajon futtasd meg az apróra vágott hagymát, szórj rá csipet pirospaprikát, gyorsan keverd el.", "Add hozzá a kinyomkodott tököt, a kaprot és kevés vizet, és párold puhára 10–15 perc alatt.", "Ízesítsd kevés ecettel.", "Habarás rántás nélkül: a joghurtot keverd simára a liszttel, lazítsd fel pár kanál meleg lével, öntsd vissza, és forrald össze 2–3 percig."], "bloodSugarTip": "A klasszikus tejfölös-lisztes habarás helyett joghurt és kevés teljes kiőrlésű liszt – könnyebb és vércukorbarátabb, mégis krémes.", "digestionTip": "A tök lágy, magas víztartalmú zöldség, kíméletes az emésztésnek; a kapor segíti a puffadás megelőzését.", "prepOrLeftoverTip": "2–3 napra főzd. Egy sült fasírttal (R17) vagy sült csirkemellel (R20) komplett, fehérjedús ebéd.", "storage": {"freezable": "Inkább nem (a habart főzelék állaga romlik fagyasztva).", "fridge": "Igen, 2–3 napig is.", "freshRecommended": "Maradékként is jó, felmelegítve.", "nextDayIdea": "Egy adag mellé másnap sült hús kerüljön a feltét helyett, hogy más legyen a kombináció.", "raw": "- Fagyasztható-e: Inkább nem (a habart főzelék állaga romlik fagyasztva).\n- Hűtőben tartható-e 1–2 napig: Igen, 2–3 napig is.\n- Frissen érdemes-e elkészíteni: Maradékként is jó, felmelegítve.\n- Másnapi felhasználási ötlet: Egy adag mellé másnap sült hús kerüljön a feltét helyett, hogy más legyen a kombináció.\n\n---"}, "rawText": "**Recept ID:** R13\n**Recept neve:** Tökfőzelék egészségesebben\n**Kategória:** Főzelék\n**Címkék:** főzelék, magyaros, vércukorbarát, emésztésbarát, kevés olajjal, maradékfelhasználásra jó, 1–2 napig eltartható\n**Hány adagra készül:** 2–3 adag (tudatosan 2–3 napra)\n**Elkészítési idő:** kb. 35 perc\n**Hozzávalók:** kb. 80 dkg gyalult főzőtök; fél fej vöröshagyma; 1 tk olaj; egy csokor friss vagy szárított kapor; csipet pirospaprika; kevés ecet; só, bors; habaráshoz 3 ek natúr joghurt vagy kefir + 1 ek teljes kiőrlésű liszt.\n**Elkészítés lépésről lépésre:**\n1. A gyalult tököt sózd meg, és hagyd állni 10 percet, majd nyomkodd ki a levét.\n2. 1 tk olajon futtasd meg az apróra vágott hagymát, szórj rá csipet pirospaprikát, gyorsan keverd el.\n3. Add hozzá a kinyomkodott tököt, a kaprot és kevés vizet, és párold puhára 10–15 perc alatt.\n4. Ízesítsd kevés ecettel.\n5. Habarás rántás nélkül: a joghurtot keverd simára a liszttel, lazítsd fel pár kanál meleg lével, öntsd vissza, és forrald össze 2–3 percig.\n**Vércukorbarát tipp:** A klasszikus tejfölös-lisztes habarás helyett joghurt és kevés teljes kiőrlésű liszt – könnyebb és vércukorbarátabb, mégis krémes.\n**Emésztésbarát tipp:** A tök lágy, magas víztartalmú zöldség, kíméletes az emésztésnek; a kapor segíti a puffadás megelőzését.\n**Maradékfelhasználási vagy előkészítési tipp:** 2–3 napra főzd. Egy sült fasírttal (R17) vagy sült csirkemellel (R20) komplett, fehérjedús ebéd.\n**Eltarthatóság:**\n- Fagyasztható-e: Inkább nem (a habart főzelék állaga romlik fagyasztva).\n- Hűtőben tartható-e 1–2 napig: Igen, 2–3 napig is.\n- Frissen érdemes-e elkészíteni: Maradékként is jó, felmelegítve.\n- Másnapi felhasználási ötlet: Egy adag mellé másnap sült hús kerüljön a feltét helyett, hogy más legyen a kombináció.\n\n---"}, {"id": "R14", "name": "Zöldbabfőzelék", "category": "Főzelék", "tags": ["főzelék", "magyaros", "vércukorbarát", "emésztésbarát", "kevés olajjal", "fagyasztható", "1–2 napig eltartható"], "servings": "2 adag", "time": "kb. 35 perc", "ingredientsText": "kb. 60 dkg zöldbab (friss vagy fagyasztott); fél fej vöröshagyma; 1 gerezd fokhagyma; 1 tk olaj; friss petrezselyem; kevés ecet; só, bors; habaráshoz 3 ek kefir vagy natúr joghurt + 1 ek teljes kiőrlésű liszt.", "ingredients": ["kb. 60 dkg zöldbab (friss vagy fagyasztott)", "fél fej vöröshagyma", "1 gerezd fokhagyma", "1 tk olaj", "friss petrezselyem", "kevés ecet", "só, bors", "habaráshoz 3 ek kefir vagy natúr joghurt + 1 ek teljes kiőrlésű liszt."], "steps": ["A zöldbabot vágd kisebb darabokra, és főzd sós vízben 10–12 perc alatt puhára, majd szűrd le (a főzőlevét tartsd meg).", "1 tk olajon futtasd meg az apróra vágott hagymát és a reszelt fokhagymát.", "Add hozzá a zöldbabot és annyi főzőlevet, hogy szaftos legyen.", "Habarás rántás nélkül: a kefirt keverd simára a liszttel, lazítsd fel meleg lével, öntsd vissza, forrald össze 2–3 percig.", "Ízesítsd kevés ecettel, borssal, szórd meg petrezselyemmel."], "bloodSugarTip": "A zöldbab kevés szénhidrátot tartalmaz és sok rostot – jól illik a vércukorbarát étrendbe. Egy szelet sült csirkemell mellé komplett ebéd.", "digestionTip": "Könnyű, rostos zöldség; a kefires habarás a bélflórának is jót tesz.", "prepOrLeftoverTip": "Habarás nélkül lefagyasztható; felmelegítéskor frissen habard be.", "storage": {"freezable": "Igen (habarás nélkül).", "fridge": "Igen.", "freshRecommended": "Mindkettő jó.", "nextDayIdea": "Hidegen, kevés joghurtos öntettel zöldbabsaláta lesz belőle.", "raw": "- Fagyasztható-e: Igen (habarás nélkül).\n- Hűtőben tartható-e 1–2 napig: Igen.\n- Frissen érdemes-e elkészíteni: Mindkettő jó.\n- Másnapi felhasználási ötlet: Hidegen, kevés joghurtos öntettel zöldbabsaláta lesz belőle.\n\n---"}, "rawText": "**Recept ID:** R14\n**Recept neve:** Zöldbabfőzelék\n**Kategória:** Főzelék\n**Címkék:** főzelék, magyaros, vércukorbarát, emésztésbarát, kevés olajjal, fagyasztható, 1–2 napig eltartható\n**Hány adagra készül:** 2 adag\n**Elkészítési idő:** kb. 35 perc\n**Hozzávalók:** kb. 60 dkg zöldbab (friss vagy fagyasztott); fél fej vöröshagyma; 1 gerezd fokhagyma; 1 tk olaj; friss petrezselyem; kevés ecet; só, bors; habaráshoz 3 ek kefir vagy natúr joghurt + 1 ek teljes kiőrlésű liszt.\n**Elkészítés lépésről lépésre:**\n1. A zöldbabot vágd kisebb darabokra, és főzd sós vízben 10–12 perc alatt puhára, majd szűrd le (a főzőlevét tartsd meg).\n2. 1 tk olajon futtasd meg az apróra vágott hagymát és a reszelt fokhagymát.\n3. Add hozzá a zöldbabot és annyi főzőlevet, hogy szaftos legyen.\n4. Habarás rántás nélkül: a kefirt keverd simára a liszttel, lazítsd fel meleg lével, öntsd vissza, forrald össze 2–3 percig.\n5. Ízesítsd kevés ecettel, borssal, szórd meg petrezselyemmel.\n**Vércukorbarát tipp:** A zöldbab kevés szénhidrátot tartalmaz és sok rostot – jól illik a vércukorbarát étrendbe. Egy szelet sült csirkemell mellé komplett ebéd.\n**Emésztésbarát tipp:** Könnyű, rostos zöldség; a kefires habarás a bélflórának is jót tesz.\n**Maradékfelhasználási vagy előkészítési tipp:** Habarás nélkül lefagyasztható; felmelegítéskor frissen habard be.\n**Eltarthatóság:**\n- Fagyasztható-e: Igen (habarás nélkül).\n- Hűtőben tartható-e 1–2 napig: Igen.\n- Frissen érdemes-e elkészíteni: Mindkettő jó.\n- Másnapi felhasználási ötlet: Hidegen, kevés joghurtos öntettel zöldbabsaláta lesz belőle.\n\n---"}, {"id": "R15", "name": "Spenótfőzelék tojással", "category": "Főzelék", "tags": ["főzelék", "magyaros", "tojásos", "vércukorbarát", "emésztésbarát", "kevés olajjal", "1–2 napig eltartható"], "servings": "2 adag", "time": "kb. 25 perc", "ingredientsText": "kb. 50 dkg friss vagy fagyasztott aprított spenót; fél fej vöröshagyma; 1 gerezd fokhagyma; 1 tk olaj; 1 dl tej vagy 2 ek natúr joghurt; csipet szerecsendió; só, bors; sűrítéshez 1 tk teljes kiőrlésű liszt; tálaláshoz 1–2 db tojás (tükörtojás vagy főtt tojás).", "ingredients": ["kb. 50 dkg friss vagy fagyasztott aprított spenót", "fél fej vöröshagyma", "1 gerezd fokhagyma", "1 tk olaj", "1 dl tej vagy 2 ek natúr joghurt", "csipet szerecsendió", "só, bors", "sűrítéshez 1 tk teljes kiőrlésű liszt", "tálaláshoz 1–2 db tojás (tükörtojás vagy főtt tojás)."], "steps": ["1 tk olajon futtasd meg az apróra vágott hagymát és a reszelt fokhagymát.", "Add hozzá a spenótot, és kevergetve hagyd összeesni 3–4 perc alatt.", "Önts hozzá kevés tejet, fűszerezd szerecsendióval, sózd, borsozd.", "Sűrítsd 1 tk teljes kiőrlésű liszttel, amit kevés hideg tejben elkevertél; forrald össze 2–3 percig (vagy botmixerrel simítsd krémesre).", "Tetejére tégy 1–2 tükörtojást vagy felkarikázott főtt tojást."], "bloodSugarTip": "A tojás fehérjéje teszi laktatóvá és vércukorbaráttá; nincs szükség sok kenyérre mellé.", "digestionTip": "A spenót rostban és vasban gazdag, főzve könnyen emészthető; a szerecsendió segít a puffadás ellen.", "prepOrLeftoverTip": "A spenótkrémet előre elkészítheted, és a tojást frissen tedd rá tálaláskor.", "storage": {"freezable": "A spenótalap igen; a tojást mindig frissen add hozzá.", "fridge": "Igen (tojás nélkül).", "freshRecommended": "A tojás frissen kerüljön rá.", "nextDayIdea": "Sűrűbbre hagyva tojásos-spenótos szendvicskrém lesz belőle.", "raw": "- Fagyasztható-e: A spenótalap igen; a tojást mindig frissen add hozzá.\n- Hűtőben tartható-e 1–2 napig: Igen (tojás nélkül).\n- Frissen érdemes-e elkészíteni: A tojás frissen kerüljön rá.\n- Másnapi felhasználási ötlet: Sűrűbbre hagyva tojásos-spenótos szendvicskrém lesz belőle.\n\n---"}, "rawText": "**Recept ID:** R15\n**Recept neve:** Spenótfőzelék tojással\n**Kategória:** Főzelék\n**Címkék:** főzelék, magyaros, tojásos, vércukorbarát, emésztésbarát, kevés olajjal, 1–2 napig eltartható\n**Hány adagra készül:** 2 adag\n**Elkészítési idő:** kb. 25 perc\n**Hozzávalók:** kb. 50 dkg friss vagy fagyasztott aprított spenót; fél fej vöröshagyma; 1 gerezd fokhagyma; 1 tk olaj; 1 dl tej vagy 2 ek natúr joghurt; csipet szerecsendió; só, bors; sűrítéshez 1 tk teljes kiőrlésű liszt; tálaláshoz 1–2 db tojás (tükörtojás vagy főtt tojás).\n**Elkészítés lépésről lépésre:**\n1. 1 tk olajon futtasd meg az apróra vágott hagymát és a reszelt fokhagymát.\n2. Add hozzá a spenótot, és kevergetve hagyd összeesni 3–4 perc alatt.\n3. Önts hozzá kevés tejet, fűszerezd szerecsendióval, sózd, borsozd.\n4. Sűrítsd 1 tk teljes kiőrlésű liszttel, amit kevés hideg tejben elkevertél; forrald össze 2–3 percig (vagy botmixerrel simítsd krémesre).\n5. Tetejére tégy 1–2 tükörtojást vagy felkarikázott főtt tojást.\n**Vércukorbarát tipp:** A tojás fehérjéje teszi laktatóvá és vércukorbaráttá; nincs szükség sok kenyérre mellé.\n**Emésztésbarát tipp:** A spenót rostban és vasban gazdag, főzve könnyen emészthető; a szerecsendió segít a puffadás ellen.\n**Maradékfelhasználási vagy előkészítési tipp:** A spenótkrémet előre elkészítheted, és a tojást frissen tedd rá tálaláskor.\n**Eltarthatóság:**\n- Fagyasztható-e: A spenótalap igen; a tojást mindig frissen add hozzá.\n- Hűtőben tartható-e 1–2 napig: Igen (tojás nélkül).\n- Frissen érdemes-e elkészíteni: A tojás frissen kerüljön rá.\n- Másnapi felhasználási ötlet: Sűrűbbre hagyva tojásos-spenótos szendvicskrém lesz belőle.\n\n---"}, {"id": "R16", "name": "Kelkáposztafőzelék", "category": "Főzelék", "tags": ["főzelék", "magyaros", "vércukorbarát", "emésztésbarát", "kevés olajjal", "maradékfelhasználásra jó", "1–2 napig eltartható"], "servings": "2 adag (tudatosan 2 napra)", "time": "kb. 35 perc", "ingredientsText": "1 kisebb fej kelkáposzta; fél fej vöröshagyma; 1 gerezd fokhagyma; 1 kisebb burgonya (a sűrítéshez); 1 tk olaj; csipet pirospaprika és kömény; só, bors; tálaláshoz feltét (1 tükörtojás vagy 1 vékony szelet sovány sonka).", "ingredients": ["1 kisebb fej kelkáposzta", "fél fej vöröshagyma", "1 gerezd fokhagyma", "1 kisebb burgonya (a sűrítéshez)", "1 tk olaj", "csipet pirospaprika és kömény", "só, bors", "tálaláshoz feltét (1 tükörtojás vagy 1 vékony szelet sovány sonka)."], "steps": ["A kelkáposztát csíkozd fel, a burgonyát kockázd fel.", "1 tk olajon futtasd meg az apróra vágott hagymát, szórj rá csipet pirospaprikát és köménymagot.", "Add hozzá a kelkáposztát, a burgonyát és annyi vizet, hogy majdnem ellepje; sózd.", "Főzd 15–20 perc alatt puhára.", "Sűrítés rántás nélkül: a megfőtt burgonya egy részét törd össze vagy turmixolj ki egy keveset a főzelékből, és keverd vissza – ettől krémes lesz liszt nélkül.", "Tálald 1 tükörtojással vagy egy szelet sovány sonkával a fehérjéért."], "bloodSugarTip": "A sűrítés burgonyából és turmixolásból jön, nem rántásból; a burgonyából csak annyi van, amennyi a krémességhez kell.", "digestionTip": "A kelkáposzta rostos; a kömény segít, hogy ne puffasszon. Jól főzd puhára, és igyál mellé vizet.", "prepOrLeftoverTip": "2 napra főzd; másnap más feltéttel (pl. fasírt helyett tükörtojás) tálald, hogy változatos legyen.", "storage": {"freezable": "Igen (feltét nélkül).", "fridge": "Igen.", "freshRecommended": "Maradékként is finom.", "nextDayIdea": "Egy kevés reszelt sajttal megszórva, sütőben átsütve rakott jellegű étel lesz belőle.", "raw": "- Fagyasztható-e: Igen (feltét nélkül).\n- Hűtőben tartható-e 1–2 napig: Igen.\n- Frissen érdemes-e elkészíteni: Maradékként is finom.\n- Másnapi felhasználási ötlet: Egy kevés reszelt sajttal megszórva, sütőben átsütve rakott jellegű étel lesz belőle.\n\n### Húsos feltétek és főételek\n\n---"}, "rawText": "**Recept ID:** R16\n**Recept neve:** Kelkáposztafőzelék\n**Kategória:** Főzelék\n**Címkék:** főzelék, magyaros, vércukorbarát, emésztésbarát, kevés olajjal, maradékfelhasználásra jó, 1–2 napig eltartható\n**Hány adagra készül:** 2 adag (tudatosan 2 napra)\n**Elkészítési idő:** kb. 35 perc\n**Hozzávalók:** 1 kisebb fej kelkáposzta; fél fej vöröshagyma; 1 gerezd fokhagyma; 1 kisebb burgonya (a sűrítéshez); 1 tk olaj; csipet pirospaprika és kömény; só, bors; tálaláshoz feltét (1 tükörtojás vagy 1 vékony szelet sovány sonka).\n**Elkészítés lépésről lépésre:**\n1. A kelkáposztát csíkozd fel, a burgonyát kockázd fel.\n2. 1 tk olajon futtasd meg az apróra vágott hagymát, szórj rá csipet pirospaprikát és köménymagot.\n3. Add hozzá a kelkáposztát, a burgonyát és annyi vizet, hogy majdnem ellepje; sózd.\n4. Főzd 15–20 perc alatt puhára.\n5. Sűrítés rántás nélkül: a megfőtt burgonya egy részét törd össze vagy turmixolj ki egy keveset a főzelékből, és keverd vissza – ettől krémes lesz liszt nélkül.\n6. Tálald 1 tükörtojással vagy egy szelet sovány sonkával a fehérjéért.\n**Vércukorbarát tipp:** A sűrítés burgonyából és turmixolásból jön, nem rántásból; a burgonyából csak annyi van, amennyi a krémességhez kell.\n**Emésztésbarát tipp:** A kelkáposzta rostos; a kömény segít, hogy ne puffasszon. Jól főzd puhára, és igyál mellé vizet.\n**Maradékfelhasználási vagy előkészítési tipp:** 2 napra főzd; másnap más feltéttel (pl. fasírt helyett tükörtojás) tálald, hogy változatos legyen.\n**Eltarthatóság:**\n- Fagyasztható-e: Igen (feltét nélkül).\n- Hűtőben tartható-e 1–2 napig: Igen.\n- Frissen érdemes-e elkészíteni: Maradékként is finom.\n- Másnapi felhasználási ötlet: Egy kevés reszelt sajttal megszórva, sütőben átsütve rakott jellegű étel lesz belőle.\n\n### Húsos feltétek és főételek\n\n---"}, {"id": "R17", "name": "Sütőben sült fasírt", "category": "Húsos feltét", "tags": ["húsos feltét", "sütőben sült", "magyaros", "vércukorbarát", "kevés olajjal", "fagyasztható", "maradékfelhasználásra jó"], "servings": "4–6 db (2–3 étkezésre)", "time": "kb. 40 perc", "ingredientsText": "kb. 35–40 dkg darált pulyka vagy sovány sertés-marha keverék; 1 tojás; 3 ek zabpehely (zsemle helyett); 1 kis fej vöröshagyma reszelve; 1 gerezd fokhagyma; friss petrezselyem; csipet pirospaprika; 1 tk mustár; só, bors.", "ingredients": ["kb. 35–40 dkg darált pulyka vagy sovány sertés-marha keverék", "1 tojás", "3 ek zabpehely (zsemle helyett)", "1 kis fej vöröshagyma reszelve", "1 gerezd fokhagyma", "friss petrezselyem", "csipet pirospaprika", "1 tk mustár", "só, bors."], "steps": ["Egy tálban keverd össze a darált húst a tojással, a zabpehellyel, a reszelt hagymával és fokhagymával.", "Fűszerezd petrezselyemmel, pirospaprikával, mustárral, sózd, borsozd, és jól gyúrd össze.", "Hagyd állni 10 percet, hogy a zab megszívja magát.", "Formázz belőle kis gombócokat, és tedd sütőpapírral bélelt tepsire.", "Süsd 190 °C-on 25–30 perc alatt, félidőben fordítsd meg. (Bő olaj nélkül, sütőben sül készre.)"], "bloodSugarTip": "Zsemle helyett zabpehely köti össze – több rost, lassabb felszívódás. A sütés bő olaj helyett zsírszegény.", "digestionTip": "A sütőben sült, nem zsíros fasírt könnyebb, mint a bő olajban sült; tegyél mellé párolt zöldséget vagy főzeléket.", "prepOrLeftoverTip": "Süss egyszerre 4–6 db-ot: másnap főzelék mellé feltét, vagy hidegen szendvicsbe is jó. Nyersen formázva is fagyasztható.", "storage": {"freezable": "Igen, sütve és nyersen is.", "fridge": "Igen, 2 napig.", "freshRecommended": "Frissen meleg, de hidegen is finom.", "nextDayIdea": "Felkarikázva teljes kiőrlésű szendvicsbe, sok zöldséggel.", "raw": "- Fagyasztható-e: Igen, sütve és nyersen is.\n- Hűtőben tartható-e 1–2 napig: Igen, 2 napig.\n- Frissen érdemes-e elkészíteni: Frissen meleg, de hidegen is finom.\n- Másnapi felhasználási ötlet: Felkarikázva teljes kiőrlésű szendvicsbe, sok zöldséggel.\n\n---"}, "rawText": "**Recept ID:** R17\n**Recept neve:** Sütőben sült fasírt\n**Kategória:** Húsos feltét\n**Címkék:** húsos feltét, sütőben sült, magyaros, vércukorbarát, kevés olajjal, fagyasztható, maradékfelhasználásra jó\n**Hány adagra készül:** 4–6 db (2–3 étkezésre)\n**Elkészítési idő:** kb. 40 perc\n**Hozzávalók:** kb. 35–40 dkg darált pulyka vagy sovány sertés-marha keverék; 1 tojás; 3 ek zabpehely (zsemle helyett); 1 kis fej vöröshagyma reszelve; 1 gerezd fokhagyma; friss petrezselyem; csipet pirospaprika; 1 tk mustár; só, bors.\n**Elkészítés lépésről lépésre:**\n1. Egy tálban keverd össze a darált húst a tojással, a zabpehellyel, a reszelt hagymával és fokhagymával.\n2. Fűszerezd petrezselyemmel, pirospaprikával, mustárral, sózd, borsozd, és jól gyúrd össze.\n3. Hagyd állni 10 percet, hogy a zab megszívja magát.\n4. Formázz belőle kis gombócokat, és tedd sütőpapírral bélelt tepsire.\n5. Süsd 190 °C-on 25–30 perc alatt, félidőben fordítsd meg. (Bő olaj nélkül, sütőben sül készre.)\n**Vércukorbarát tipp:** Zsemle helyett zabpehely köti össze – több rost, lassabb felszívódás. A sütés bő olaj helyett zsírszegény.\n**Emésztésbarát tipp:** A sütőben sült, nem zsíros fasírt könnyebb, mint a bő olajban sült; tegyél mellé párolt zöldséget vagy főzeléket.\n**Maradékfelhasználási vagy előkészítési tipp:** Süss egyszerre 4–6 db-ot: másnap főzelék mellé feltét, vagy hidegen szendvicsbe is jó. Nyersen formázva is fagyasztható.\n**Eltarthatóság:**\n- Fagyasztható-e: Igen, sütve és nyersen is.\n- Hűtőben tartható-e 1–2 napig: Igen, 2 napig.\n- Frissen érdemes-e elkészíteni: Frissen meleg, de hidegen is finom.\n- Másnapi felhasználási ötlet: Felkarikázva teljes kiőrlésű szendvicsbe, sok zöldséggel.\n\n---"}, {"id": "R18", "name": "Csirkepörkölt könnyítve", "category": "Húsos feltét / főétel", "tags": ["húsos feltét", "magyaros", "vércukorbarát", "kevés olajjal", "fagyasztható", "maradékfelhasználásra jó"], "servings": "2–3 adag", "time": "kb. 50 perc", "ingredientsText": "kb. 50 dkg csirkecomb vagy -mell bőr nélkül, kockázva; 1 nagy fej vöröshagyma; 1 paprika; 1 paradicsom; 1 gerezd fokhagyma; 1 tk olaj; 1 ek pirospaprika; só, bors; köretnek 3–4 ek főtt barna rizs adagonként.", "ingredients": ["kb. 50 dkg csirkecomb vagy -mell bőr nélkül, kockázva", "1 nagy fej vöröshagyma", "1 paprika", "1 paradicsom", "1 gerezd fokhagyma", "1 tk olaj", "1 ek pirospaprika", "só, bors", "köretnek 3–4 ek főtt barna rizs adagonként."], "steps": ["1 tk olajon, fedő alatt, lassan párold üvegesre a sok apróra vágott hagymát (a sok hagyma adja a szaft sűrűségét rántás nélkül).", "Húzd le a tűzről, szórd rá a pirospaprikát, gyorsan keverd el, hogy ne égjen meg.", "Add hozzá a felkockázott csirkét, és fehéredésig kevergesd.", "Tedd bele a felkockázott paprikát, paradicsomot, a reszelt fokhagymát, sózd.", "Önts alá kevés vizet, és fedő alatt, saját levében főzd 35–40 perc alatt puhára. Ha kell, pótold a vizet."], "bloodSugarTip": "Itt nincs rántás vagy nagy zsír – a hagyma sűríti a szaftot. A köretből (barna rizs) csak 3–4 ek kerüljön a tányérra.", "digestionTip": "A bőr nélküli csirke és a kevés zsír könnyebb az emésztésnek; sok hagyma és paprika rostot ad.", "prepOrLeftoverTip": "2–3 adag készül; másnap köretet cserélve (rizs helyett párolt zöldség) más étkezési élmény lesz belőle.", "storage": {"freezable": "Igen, kiválóan.", "fridge": "Igen, 2–3 napig.", "freshRecommended": "Maradékként még finomabb (összeérnek az ízek).", "nextDayIdea": "A húst kicsit felaprítva, kevés szafttal tölteléknek paprikába vagy rakott zöldségbe.", "raw": "- Fagyasztható-e: Igen, kiválóan.\n- Hűtőben tartható-e 1–2 napig: Igen, 2–3 napig.\n- Frissen érdemes-e elkészíteni: Maradékként még finomabb (összeérnek az ízek).\n- Másnapi felhasználási ötlet: A húst kicsit felaprítva, kevés szafttal tölteléknek paprikába vagy rakott zöldségbe.\n\n---"}, "rawText": "**Recept ID:** R18\n**Recept neve:** Csirkepörkölt könnyítve\n**Kategória:** Húsos feltét / főétel\n**Címkék:** húsos feltét, magyaros, vércukorbarát, kevés olajjal, fagyasztható, maradékfelhasználásra jó\n**Hány adagra készül:** 2–3 adag\n**Elkészítési idő:** kb. 50 perc\n**Hozzávalók:** kb. 50 dkg csirkecomb vagy -mell bőr nélkül, kockázva; 1 nagy fej vöröshagyma; 1 paprika; 1 paradicsom; 1 gerezd fokhagyma; 1 tk olaj; 1 ek pirospaprika; só, bors; köretnek 3–4 ek főtt barna rizs adagonként.\n**Elkészítés lépésről lépésre:**\n1. 1 tk olajon, fedő alatt, lassan párold üvegesre a sok apróra vágott hagymát (a sok hagyma adja a szaft sűrűségét rántás nélkül).\n2. Húzd le a tűzről, szórd rá a pirospaprikát, gyorsan keverd el, hogy ne égjen meg.\n3. Add hozzá a felkockázott csirkét, és fehéredésig kevergesd.\n4. Tedd bele a felkockázott paprikát, paradicsomot, a reszelt fokhagymát, sózd.\n5. Önts alá kevés vizet, és fedő alatt, saját levében főzd 35–40 perc alatt puhára. Ha kell, pótold a vizet.\n**Vércukorbarát tipp:** Itt nincs rántás vagy nagy zsír – a hagyma sűríti a szaftot. A köretből (barna rizs) csak 3–4 ek kerüljön a tányérra.\n**Emésztésbarát tipp:** A bőr nélküli csirke és a kevés zsír könnyebb az emésztésnek; sok hagyma és paprika rostot ad.\n**Maradékfelhasználási vagy előkészítési tipp:** 2–3 adag készül; másnap köretet cserélve (rizs helyett párolt zöldség) más étkezési élmény lesz belőle.\n**Eltarthatóság:**\n- Fagyasztható-e: Igen, kiválóan.\n- Hűtőben tartható-e 1–2 napig: Igen, 2–3 napig.\n- Frissen érdemes-e elkészíteni: Maradékként még finomabb (összeérnek az ízek).\n- Másnapi felhasználási ötlet: A húst kicsit felaprítva, kevés szafttal tölteléknek paprikába vagy rakott zöldségbe.\n\n---"}, {"id": "R19", "name": "Rakott zöldség", "category": "Sütőben sült főétel", "tags": ["sütőben sült", "főétel", "magyaros", "vércukorbarát", "emésztésbarát", "fagyasztható", "maradékfelhasználásra jó"], "servings": "2 adag", "time": "kb. 55 perc", "ingredientsText": "vegyes zöldség (1 cukkini, néhány karfiol- és brokkolirózsa, 1 sárgarépa); kb. 25 dkg darált pulyka; fél fej vöröshagyma; csipet pirospaprika; 2 db főtt tojás; öntethez 2 dl natúr joghurt + 1 tojás; kevés reszelt sajt; 1 tk olaj; só, bors.", "ingredients": ["vegyes zöldség (1 cukkini, néhány karfiol- és brokkolirózsa, 1 sárgarépa)", "kb. 25 dkg darált pulyka", "fél fej vöröshagyma", "csipet pirospaprika", "2 db főtt tojás", "öntethez 2 dl natúr joghurt + 1 tojás", "kevés reszelt sajt", "1 tk olaj", "só, bors."], "steps": ["A zöldségeket vágd falatnyira, és előpárold/forrald 5–6 perc alatt majdnem puhára, majd szűrd le.", "A da \n2. A darált húst 1 tk olajon, apróra vágott hagymával pirítsd meg, fűszerezd pirospaprikával, sóval.\n3. Egy hőálló tálba rétegezz: zöldség, darált hús, karikázott főtt tojás, majd újra zöldség.\n4. Az öntethez keverd simára a joghurtot a nyers tojással, sózd, és öntsd a tetejére (ez a rántás nélküli „összesütő\" réteg).\n5. Szórd meg kevés sajttal, és süsd 180 °C-on 25–30 perc alatt, amíg a teteje aranybarna.\n**Vércukorbarát tipp:** A klasszikus tejfölös-rizses rakott helyett itt sok zöldség és joghurtos öntet van – jóval kevesebb szénhidrát és zsír.\n**Emésztésbarát tipp:** Sok párolt zöldség és könnyű öntet; a párolás kíméletesebb, mint a sütés bő zsírban.\n**Maradékfelhasználási vagy előkészítési tipp:** Másnap hidegen is finom; a zöldséget előző nap előpárolhatod, így gyorsabb az összeállítás.\n**Eltarthatóság:**\n- Fagyasztható-e: Igen (kicsit lágyabb lesz a zöldség kiengedés után).\n- Hűtőben tartható-e 1–2 napig: Igen, 2 napig.\n- Frissen érdemes-e elkészíteni: Frissen sülve a legjobb, de maradékként is jó.\n- Másnapi felhasználási ötlet: Hidegen, salátalevélen tálalva könnyű ebéd vagy vacsora.\n\n---"}, {"id": "R20", "name": "Sült csirkemell zöldségágyon", "category": "Húsos feltét", "tags": ["sütőben sült", "húsos feltét", "magyaros", "mediterrán jellegű", "vércukorbarát", "kevés olajjal", "maradékfelhasználásra jó"], "servings": "2 adag (érdemes duplán sütni)", "time": "kb. 40 perc", "ingredientsText": "2 db csirkemellfilé; 1 cukkini; 1 paprika; 1 paradicsom; fél fej vöröshagyma; 1 gerezd fokhagyma; 1–2 tk olívaolaj; oregánó, bazsalikom; kevés citromlé; só, bors.", "ingredients": ["2 db csirkemellfilé", "1 cukkini", "1 paprika", "1 paradicsom", "fél fej vöröshagyma", "1 gerezd fokhagyma", "1–2 tk olívaolaj", "oregánó, bazsalikom", "kevés citromlé", "só, bors."], "steps": ["A zöldségeket vágd falatnyira, tedd egy tepsibe, locsold meg 1 tk olívaolajjal, sózd, fűszerezd.", "A csirkemellet dörzsöld be a maradék kevés olajjal, fokhagymával, oregánóval, bazs
